body:
  text: 唐人萬首絶句選卷四宋洪邁元本刑部尚書王士禎選七言二李益夜上受降城聞笛回樂峰前沙似雪受降城外月如霜不知何處吹蘆管一夜征人盡望鄉邊思腰垂錦帶佩吳鉤走馬曾防玉塞秋莫笑關西將家子祇將詩思入涼州柳楊送客青楓江畔白蘋洲楚客傷離不待秋君見隋朝更何事栁楊南渡水悠悠從軍北征天山雪後海風寒橫笛偏吹行路難磧裏征人三十萬一時回首月中看行舟栁花飛入正行舟卧引菱花信碧流聞道風光滿楊子天晴共上望鄉樓隋宫燕燕語如傷舊國春宫花欲落旋成塵自從一閉風光後幾度飛來不見人送人歸嶽陽烟草連天楓樹齊嶽陽歸路子規啼春江萬里巴陵戍落日看沈楚水西臨滹沱見蕃使列名漠南春色到滹沱邊栁青青塞馬多萬里江山今不閉漢家頻許郅支和寫情水紋珍簟思悠悠千里佳期一夕休從此無心愛良夜任他明月下西樓聽曉角邊霜昨夜墮關榆吹角當城片月孤無限塞鴻飛不度秋風引入小單于汴河曲汴水東流無限春隋家宫闕巳成塵行人莫上長隄望風起楊花愁殺人暖川胡風凍合鸊鵜泉牛馬千羣逐暖川塞外征行無盡日年年移帳雪中天宫怨露溼晴花春殿香月明歌吹在昭陽似將海水添宫漏共滴長門一夜長度破汭沙破汭沙頭雁正飛鸊鵜泉上戰初歸平明日出東南地滿磧寒光生鐡衣盧綸古豔詞自拈裙帶結同心暖處偏知香氣深愛捉狂夫問閒事不知歌舞用黃金宫中樂二首臺殿雲涼秋色微君王初賜六宫衣樓船泛罷歸猶早行遣才人鬬射飛雲日呈祥禮物殊彤庭生獻五單于塞垣萬里無飛鳥可是邊城用郅都春日有懷桃李風多日欲隂伯勞飛處落花深貧居靜久難逢信知隔春山不可尋曲江春望二首菖蒲翻葉柳交枝暗上蓮舟鳥不知更到無花最深處玉樓金殿影參差泉聲遍野入芳洲擁沫吹花上碧流落日行人漸無路巢蜂乳燕滿髙樓司空曙登峴亭峴山回首望秦關南向荆州幾日還今日登臨惟有淚不知風景在何山古寺花共愛芳菲此樹中千跗萬蘂裹枝紅遲遲欲去猶回望覆地無人滿寺風發渝州却寄韋判官紅燭津亭夜見君繁弦急管兩紛紛平明分手空江上唯有猿聲滿水雲送盧徹之太原榆落鵰飛關塞秋黃雲畫角見并州翩翩羽騎雙旌後上客親隨郭細侯峽口送友人峽口花飛欲盡春天涯去住淚沾中來時萬里同為客今日翻成送故人李端送劉侍御幾人同去謝宣城未及酬恩隔死生唯有夜猿知客恨嶧陽溪路第三聲郎士元柏林寺南望溪上遙聞精舍鐘泊舟微徑度深松青山霽後雲猶在畫出西南四五峰栁中庸河陽橋送别黃河流出有浮橋晉國歸人此路遙若傍䦨干千里望北風驅馬雨瀟瀟征人怨嵗嵗金河復玉關朝朝馬策與刀環三春白雪歸青冢萬里黃河繞黑山涼州曲關山萬里逺征人一望關山淚滿巾青海戍頭空有月黃沙磧裏本無春冷朝陽送别紅線采菱歌怨木蘭舟送客魂銷百尺樓還似洛妃乘霧去碧天無際水空流張繼楓橋夜泊月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船劉方平送别華亭霽色滿今朝雲裏檣竿去轉遙莫怪山前深復淺清淮一日兩回潮月夜更深月色半人家北斗䦨干南斗斜今夜偏知春氣暖蟲聲新透緑窗紗春怨紗窗日落漸黃昏金屋無人見淚痕寂寞空庭春欲晚梨花滿地不開門顧況聽角思歸故園黃葉滿青苔夢破城頭曉角哀此夜斷腸人不見起行殘月影徘徊宫詞玉樓天半起笙歌風送宫嬪笑語和月殿影開聞夜漏水精簾捲近秋河聽歌子夜新聲何處傳悲翁更憶太平年只今法曲無人唱己逐霓裳飛上天宿昭應武帝祈靈太一壇新豐樹色繞千官那知今夜長生殿獨閉空山月影寒小孤山古廟楓林江水邊寒鴉接飯雁橫天大孤山逺小孤出月照洞庭歸客船葉道士山房水邊垂栁赤䦨橋洞裏仙人碧玉簫近得麻姑書信否潯陽向上不通潮竹枝帝子蒼梧不復歸洞庭葉下荆雲飛巴人夜唱竹枝後腸斷曉猿聲漸稀憶故園惆悵多山人復稀杜鵑啼處淚沾衣故園此去千餘里春夢猶能夜夜歸戴叔倫夜發袁江寄李潁川劉侍御半夜回舟入楚鄉月明山水共蒼蒼孤猿更呌秋風裏不是愁人亦斷腸湘南即事盧橘花開楓葉袞出門何處望京師沅湘日夜東流去不為愁人住少時嚴維丹陽送人丹陽郭裏送行舟一别心知兩地秋日晚江南望江北寒鴉飛盡水悠悠李涉題開聖寺宿雨初收草木濃羣鴉飛散下堂鐘長廊無事僧歸院盡日門前獨看松過湖州妓宋態曾識雲仙至小時芙蓉頭上綰青絲當時驚覺髙唐夢唯有如今宋玉知潤州聽暮角江城吹角水茫茫曲引邊聲怨思長驚起暮天沙上雁海門斜去兩三行宿武關逺别秦城萬里逰亂山髙下入商州關門不鎖寒溪水一夜潺湲送客愁竹枝詞二首石壁千重樹萬重白雲斜掩碧芙蓉昭君溪上年年月偏照嬋娟色最濃十二峰頭月欲低空舲灘上子規啼孤舟一夜東歸客泣向春風憶建溪哭田布魏師臨陳却抽營誰管豺狼作信兵縱使將軍能伏劍何人島上哭田橫京口送朱晝之淮南兩行客淚愁中落萬樹山花雨後殘君到揚州見桃葉為傳風水渡江難邠州詞獻髙尚書二首單于都護再分疆西引雙旌出帝鄉朝日詔書添戰馬即聞千騎取河湟將家難立是威聲不見多傳衛霍名一自元和平蜀後馬頭行處即長城李約過華清宫君王遊樂萬幾輕一曲霓裳四海兵玉輦升天人巳盡故宫猶有樹長生權德輿贈天竺靈隱二寺主石路泉流兩寺分尋常鐘磬隔山聞山僧半在中峰住共占清猿與白雲雜興二首琥珀尊開月映簾調弦理曲指纎纖含羞斂態勸君住更奏新聲刮骨鹽巫山雲雨洛川神珠襻香腰穩稱身惆悵壯成君不見含情起立問傍人武元衡春興楊柳隂隂細雨晴殘花落盡見流鶯春風一夜吹鄉夢夢逐春風到洛城送張司録赴京江南烟雨塞鴻飛西府文章謝掾歸相送汀洲蘭杜晚菱歌一曲淚沾衣題嘉陵驛悠悠風斾繞山川山驛空濛雨似烟路半嘉陵頭已白蜀門西更上青天聽歌月上重樓絲管秋佳人夜唱古梁州滿堂誰是知音者不惜千金與莫愁汴州聞角何處金笳月裏悲悠悠邊客夢先知單于城上關山曲今日中原總解吹韓愈湘中酬張十一功曹休垂絶徼千行淚共泛清湘一葉舟今日嶺猿兼越鳥可憐同聽不知愁和李二十八司勳連昌宫夾道疏槐出老根髙甍巨桷壓山原宫前遺老來相問今是開元幾葉孫晚次宣溪酬張使君潮州南去接宣溪雲水蒼茫日向西客淚數行先自落鷓鴣休傍耳邊啼同張水部籍遊曲江寄白二十二舍人漠漠䡖隂晚自開青春白日映樓臺曲江水滿花千樹有底忙時不肯來次潼關先寄張十二閣老荆山巳去華山來日照潼關四扇開刺史莫辭迎候逺相公新破蔡州回桃林夜賀晉公西來騎火照山紅夜宿桃林臘月中手把命圭兼相印一時重疊賞元功栁宗元栁州二月宦情羈思共悽悽春半如秋意轉迷山城過雨百花盡榕葉滿庭鶯亂啼酬夢得日日臨池弄小雛還思寫論付官奴栁家新樣元和腳且盡薑芽斂手徒聞徹上人亡寄楊侍郎東越髙僧舊姓湯幾時瓊佩觸鳴璫空花一散不知處誰采金英與侍郎酬曹侍御破額山前碧玉流騷人遙駐木蘭舟春風無限瀟湘意欲採蘋花不自由劉禹錫石頭城山圍故國周遭在潮打空城寂寞回淮水東邊舊時月夜深還過女牆來烏衣巷朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家江令宅南朝詞臣北朝客歸來唯見秦淮碧池臺竹樹三畝餘至今人道江家宅與歌者米嘉榮唱得凉州意外聲舊人唯數米嘉榮近來時世䡖先輩好染髭鬚事後生聽舊宫人穆氏唱歌曽隨織女渡天河記得雲間第一歌休唱貞元供奉曲當時朝士巳無多與歌者何戡二十餘年别帝京重聞天樂不勝情舊人唯有何戡在更與殷勤唱渭城堤上行二首酒旗相望大堤頭堤下連檣堤上樓日暮行人爭渡急槳聲鴉軋滿中流江南江北望烟波入夜行人相應歌桃葉傳情竹枝怨水流無限月明多踏歌詞二首春江月出大堤平堤上女郎連袂行唱盡新詞歡不見紅霞映樹鷓鴣鳴桃蹊栁陌好經過燈下妝成月下歌為是襄王故宫地至今猶自細腰多竹枝詞八首白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動鄉情山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁日出三竿春霧消江頭蜀客駐蘭橈憑寄狂夫書一紙住在成都萬里橋城西門前灔澦堆年年波浪不能摧懊惱人心不如石少時東去復西來瞿塘嘈嘈十二灘此中道路古來難長恨人心不如水等閒平地起波瀾山上層層桃李花雲間烟火是人家銀釧金叉來負水長刀短笠去燒畬楊栁青青江水平聞郎江上踏歌聲東邊日出西邊雨道是無晴還有晴楚水巴山烟雨多巴人能唱本鄉歌今朝北客思歸去回入紇那披緑蘿楊栁枝詞三首花萼樓前初種時美人樓上鬬腰肢如今拋擲長街裏露葉如啼欲恨誰煬帝行宫汴水濵數株殘栁不勝春晚來風起花如雪飛入宫牆不見人城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離浪淘沙詞鸚鵡洲頭浪颭沙青樓春望日將斜銜泥燕子爭歸舍獨自狂夫不憶家碧澗寺見元九和展上人詩廊下題詩滿壁塵塔前松樹巳鱗皴古來唯有王文度重見平生竺道人春詞新妝宜面下朱樓深鎖春光一院愁行到中庭數花朵蜻蜓飛上玉搔頭和令狐相公别牡丹平章宅裏一䦨花臨到開時不在家莫道兩京非逺别春明門外即天涯白居易同李十一醉憶元九花時同醉破春愁醉折花枝作酒籌忽憶故人天際去計程今日到梁州竹枝瞿塘峽口水烟低白帝城頭月向西唱到竹枝聲咽處斷猿晴鳥一時啼宫詞淚盡羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚熏籠坐到明暮江吟一道殘陽鋪水中半江瑟瑟半江紅誰憐九月初三夜露似真珠月似弓三月二十八日贈周判官一春惆悵殘三日醉問周郎憶得無栁絮送人鶯勸酒去年今日到東都伊州老去將何散老愁新教小玉唱伊州亦應不得多年聽未教成時巳白頭華州西每逢人靜慵多歇不計程行困即眠上得籃舉未能去春風敷水店門前對酒百嵗無多時壯健一春能幾日晴明相逢且莫推辭醉聽唱陽關第四聲晚歸府晚從履道來歸府街路雖長尹不嫌馬上凉於牀上坐緑槐風透紫蕉衫魏王堤花寒懶發鳥慵啼信馬閒行到日西何處未春先有思柳條無力魏王堤王子晉廟子晉廟前山月明人聞往往夜吹笙鸞吟鳯唱聽無拍多似霓裳散序聲看采蓮小桃閒上小蓮船半采紅蓮半白蓮不似江南惡風浪芙蓉池在卧牀前香山寺空門寂靜老夫閒伴鳥隨雲往復還家醖滿瓶書滿架半移生計入香山木蘭花膩如玉指塗朱粉光似金刀翦紫霞從此時時春夢裏應添一樹女郎花楊栁枝紅板江橋青酒旗館娃宫暖日斜時可憐雨歇東風定萬樹千條各自垂酬裴令公贈馬相戲安石風流無奈何欲將赤驥換青娥不辭便送東山去臨老何人與唱歌水調五言一遍最殷勤調少情多似有因不㑹當時翻曲意此聲腸斷為何人永豐坊園中垂柳一樹春風千萬枝嫩於金色軟於絲永豐西角荒園裏盡日無人屬阿誰元稹西明寺牡丹花向琉璃地上生光風炫轉紫雲英自從天女盤中見直至今朝眼更明亞枝紅平陽池上亞枝紅悵望山郵事事同還向萬竿深竹裏一枝渾卧碧流中梁州夢夢君同繞曲江頭也向慈恩院院遊亭吏呼人排馬去忽驚身在古梁州嘉陵驛嘉陵驛裏空牀客一夜嘉陵江水聲仍對牆南滿山樹野花撩亂月朧明嘉陵江秦人惟識秦中水長想吳江與蜀江今日嘉川驛樓下可憐如練繞明窗好時節身騎驄馬峨嵋下面帶霜威卓氏前虛度東川好時節酒樓元被蜀兒眠送孫勝桐花暗淡柳惺忪池帶輕波栁帶風今日與君臨水别可憐春盡宋亭中嶽陽樓嶽陽樓上日銜窗影倒深潭赤玉幢悵望殘春萬般意滿櫺湖水入西江寄庾敬休小來同在曲江頭不省春時不共遊今日江風好暄暖可憐春盡古湘州西歸五年江上損容顔今日春風到武關兩紙京書臨水讀小桃花樹滿商山重贈樂天莫遣玲瓏唱我詩我詩多是别君辭明朝又向江頭别月落潮平是去時李德裕長安秋夜內官傳詔問戎機載筆金鑾夜始歸萬户千門皆寂寂月中清露㸃朝衣李紳却望芙蓉湖丹橘村邊烟火微碧波明處雁初飛蕭條落日垂楊岸隔水寥寥聞搗衣王播題惠照寺二首三十年前此院遊木蘭花發院新修如今再到經行地樹老無花僧白頭上堂巳了各西東慙愧闍梨飯後鐘三十年來塵撲面如今始得碧紗籠熊孺登送凖上人歸石經院旃檀刻像今猶少白石鐫經古未曽歸去又尋翻譯寺前山應邇雁門僧湘江夜泛江流如箭月如弓行盡三湘數夜中無那子規知向蜀一聲聲似怨春風送僧雲心自在山山去何處靈山不是歸日暮寒林投古寺雪花飛滿水田衣戎昱移家别湖上亭好去春風湖上亭栁條藤蔓繫離情黃鶯久住渾相識欲别頻啼四五聲塞下曲漢將歸來虜塞空旌旗初下玉關東髙蹄戰馬三千匹落日平原秋草中途中寄李三楊栁烟含灞岸春年年攀折為行人好風若借低枝便莫遣青絲掃路塵唐人萬首絶句選卷四
