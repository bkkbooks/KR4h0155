body:
  text: 唐人萬首絶句選總集類提要臣等謹案唐人萬首絶句選七卷國朝王士禎編洪邁唐人萬首絶句務求盈數蹖駁至多宋倉部侍郎福清林清之真父鈔取其佳者得七言一千二百八十首五言一百五十六首六言十五首勒為四卷名曰唐絶句選見於陳振孫書録解題蓋十分之中汰其八分有竒然其書不傳無由知其善否士禎此編刪存八百九十五首作者二百六十四人更十分而取其一矣其書成于康熙戊子距士禎之沒僅三年最為晚出又當田居閒暇之時得以從容校理故較他選為精審然其序謂以當唐樂府則不盡然樂府主聲不主詞其采詩入樂亦不專取絶句士禎此書實選詞而非選聲無庸務為髙論也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀唐人萬首絶句選序漁洋山人撰宋洪氏唐人萬首絶句既成或問曰先生撰唐人絶句意何居應之曰吾以庀唐樂府也曰絶句也而謂之樂府何也曰樂府之名其來尚矣世謂始於漢武非也按史記髙祖過沛詩三侯之章又令唐山夫人為房中之歌西京雜記又謂戚夫人善歌出塞入塞望歸之曲則樂府實始漢初武帝時增天馬赤蛟白麟等十九章以李延年為協律都尉集五經之士相與次第其聲通知其意而樂府始盛其云武帝者託始焉爾東漢之末曹氏父子兄弟雅擅文藻所為樂府悲壯奧崛頗有漢之遺風降及江左古意寖微而清商繼作於是楚調吳聲西曲南弄雜然興焉逮於有唐李杜韓栁元白張王李賀孟郊之倫皆有冠古之才不沿齊梁不襲漢魏因事立題號稱樂府之變然考之開元天寶已來宫掖所傳梨園弟子所歌旗亭所唱邊將所進率當時名士所為絶句爾故王之渙黃河逺上王昌齡昭陽日影之句至今豔稱之而右丞渭城朝雨流傳尤衆好事者至譜為陽關三疊他如劉禹錫張祜諸篇尤難指數由是言之唐三百年以絶句擅場即唐三百年之樂府也而子又奚疑宋洪文敏公邁常集唐絶句至萬首經進孝宗御覽褒賜優厚余少習是書惜其踳駮久欲為之刊定而未暇也歸田之五載為康熙戊子乃克成之而以問答之語次為序云
