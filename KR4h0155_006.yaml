  - {type: page-break, offset: 0, content: '', id: KR4h0155_WYG_006-1a, image: WYG1459/WYG1459-0146a.png}
body:
  text: 唐人萬首絶句選卷六宋洪邁元本刑部尚書王士禎選七言四杜牧過勤政樓千秋佳節名空在承露絲囊世己無唯有紫苔偏稱意年年因雨上金鋪思舊遊二首十載飄然繩檢外樽前自獻自為酬秋山春雨間吟處倚遍江南寺寺樓李白題詩水西寺古木回巖樓閣風半醒半醉遊三日紅白花開山雨中過華清宫長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來登樂遊原長空淡淡孤鳥沒萬古銷沉向此中看取漢家何事業五陵無樹起秋風沈下賢斯人清唱何人和草徑苔蕪不可尋一夕小敷山下夢水如環珮月如襟將赴吳興登樂遊原清時有味是無能間愛孤雲靜愛僧欲把一麾江海去樂遊原上望昭陵江南春千里鶯啼緑映紅水村山郭酒旗風南朝四百八十寺多少樓臺煙雨中雲夢澤日旗龍斾想飄揚一索功髙縛楚王直是超然五湖客未知終始郭汾陽題城樓鳴軋江樓角一聲微陽瀲瀲落寒汀不用憑欄苦回首故鄉七十五長亭初冬夜飲淮陽多病偶求歡客袖侵霜舉燭盤砌下梨花一堆雪明年誰此憑闌干斑竹筒簟血染斑斑成錦紋千年遺恨至今存分明知是湘妃淚何忍將身卧淚痕醉後題僧院觥船一棹百分空十載青春不負公今日鬢絲禪榻畔茶煙輕揚落花風赤壁折戟沈沙鐡未銷自將磨洗認前朝東風不與周郎便銅雀春深鎖二喬泊秦淮煙籠寒水月籠沙夜泊秦淮近酒家商女不知亡國恨隔江猶唱後庭花秋浦途中瀟瀟山路窮秋雨淅淅溪風兩岸蒲為問寒沙新到雁來時還下杜陵無題桃花夫人廟細腰宫裏露桃新脈脈無言度幾春至竟息亡緣底事可憐金谷墜樓人寄揚州韓綽判官青山隱隱水迢迢秋盡江南草木凋二十四橋明月夜玉人何處教吹簫鄭瓘協律廣文遺韻留樗散雞犬圖書共一船自説江湖不歸事阻風中酒過年年江上楚鄉寒食橘花時野渡臨風駐綵旗草色連雲人去住水紋如縠燕差池宣州開元寺松寺曽同一鶴棲夜深臺殿月髙低何人為倚東樓柱正是千山雪漲溪南陵道中南陵水面漫悠悠風緊雲寒欲變秋正是客心孤迥處誰家紅袖憑江樓遣懷落魄江湖載酒行楚腰纖細掌中情十年一覺揚州夢贏得青樓薄幸名山行逺上寒山石徑斜白雲生處有人家停車坐愛楓林晚霜葉紅於二月花懷吳中馮秀才長洲苑外草蕭蕭却計郵程嵗月遙唯有别時今不忘暮煙秋雨過楓橋七夕銀燭秋光冷畫屏輕羅小扇撲流螢瑶階夜色涼如水坐看牽牛織女星華清宫零葉翻紅萬樹霜玉蓮間蕊暖泉香行雲不下朝元閣一曲淋鈴淚萬行郡樓有宴病不赴十二層樓敞畫簷連雲歌盡草纖纖空堂病怯階前月燕子嗔垂一桁簾隋苑紅霞一抹廣陵春定子當筵睡臉新却笑丘墟隋煬帝破家亡國為何人邊上聞笳何處吹笳薄暮天塞垣髙鳥沒狼煙逰人一聽頭堪白蘇武爭禁十九年金谷園繁華事散逐香塵流水無情草自春日暮東風怨啼鳥落花猶似墜樓人韓琮楊柳枝詞枝鬬纖腰葉鬬眉春來無處不如絲灞陵原上多離别少有長條拂地垂暮春滻水送别緑暗紅稀出鳳城暮雲宫闕古今情行人莫聽宫前水流盡年光是此聲施肩吾山中得劉秀才京書自笑家貧客到踈滿庭煙草不曽鋤今朝誰料三千里忽得劉公一紙書戲贈李主簿官罷江南客恨遙二年空被酒中消不知暗數春逰處偏憶揚州第幾橋雍陶宿嘉陵館樓離思茫茫正值秋每因風景却生愁今宵難作刀州夢月色江聲共一樓和孫明府懷舊山五栁先生本在山偶然為客落人間秋來見月多歸思自起開籠放白鷴城西訪友人别墅灃水橋西小徑斜日髙猶未到君家村園門巷多相似處處春風枳殼花天津橋春望津橋春水浸紅霞煙栁風絲拂岸斜翠輦不來金殿閉宫鶯銜出上陽花李商隱華山題王母祠蓮華峰下鎖雕梁此去瑶池地共長好為麻姑到東海勸栽黃竹莫栽桑華清宫華清恩幸古無倫猶恐蛾眉不勝人未免被他褒女笑只教天子暫蒙塵北齊二首一笑相傾國便亡何勞荆棘始堪傷小憐玉體橫陳夜己報周師入晉陽巧笑知堪敵萬幾傾城最在著戎衣晉陽己陷休回顧更請君王獵一圍夜雨寄北君問歸期未有期巴山夜雨漲秋池何當共剪西窗燭却話巴山夜雨時贈歌妓水精如意玉連環下蔡城危莫破顔紅綻櫻桃含白雪斷腸聲裏唱陽關寄令狐郎中嵩雲秦樹久離居雙鯉迢迢一紙書休問梁園舊賓客茂陵秋雨病相如杜司勳髙樓風雨感斯文短翼差池不及羣刻意傷春復傷别人間唯有杜司勳嶽陽樓漢水方城帶百蠻四鄰誰道亂周班如何一夢髙唐雨自此無心入武關寄成都二從事家近虹渠曲水濱全家羅襪起秋塵莫將越客千絲網網得西施别贈人漢宫詞青雀西飛竟未回君王長在集靈臺侍臣最有相如渴不賜金莖露一杯柳曽逐東風拂舞筵樂遊春苑斷腸天如何肯到清秋日巳帶斜陽又帶蟬為有為有雲屏無限嬌鳳城寒盡怕春宵無端嫁得金龜壻辜負香衾事早朝飲席代官妓贈兩從事新人橋上著春衫舊主江邊側帽簷願得化為紅綬帶許教雙鳳一時銜代魏宫私贈來時西館阻佳期去後漳河隔夢思知有宓妃無限意春松秋菊可同時詠史北湖南埭水漫漫一片降旗百尺竿三百年間同曉夢鍾山何處有龍盤漢宫通靈夜醮達清晨承露盤晞甲帳春王母西歸方朔去更須重見李夫人江東驚魚潑刺燕翩翾獨自江東上釣船今日春光太漂蕩謝家輕絮沈郎錢代應本來銀漢是紅牆隔得盧家白玉堂誰與王昌報消息盡知三十六鴛鴦過鄭廣文舊居宋玉平生恨有餘逺循三楚弔三閭可憐留著臨江宅異代應教庾信居涉洛川通谷陽林不見人我來遺恨古時春宓妃漫結無窮恨不為君王殺灌均宫妓珠箔輕明拂玉墀披香新殿鬬腰支不須看盡魚龍戲終遣君王怒偃師宫詞君恩如水向東流得寵憂移失寵愁莫向尊前奏花落涼風只在殿西頭代贈二首樓上黃昏欲望休玉梯橫絶月中鈎芭蕉不展丁香結同向春風各自愁東南日出照髙樓樓上離人唱石州總把春山掃眉黛不知供得幾多愁瑶池瑶池阿母綺窗開黃竹歌聲動地哀八駿日行三萬里穆王何事不重來板橋曉别回望髙城落曉河長亭窗户壓微波水仙欲上鯉魚去一夜芙蓉紅淚多夕陽樓花明栁暗繞天愁上盡重城更上樓欲問孤鴻向何處不知身世自悠悠西南行却寄相送者百里隂雲覆雪泥行人只在雪雲西明朝驚破還鄉夢定是陳倉碧野雞齊宫詞永夀兵來夜不扃金蓮無復印中庭梁臺歌管三更罷猶自風搖九子鈴讀任彥升碑任昉當年有美名可憐才調最縱橫梁臺初建應惆悵不得蕭公作騎兵有感非關宋玉有微辭却是襄王夢覺遲一自髙唐賦成後楚天雲雨盡堪疑過楚宫巫峽迢迢舊楚宫至今雲雨暗丹楓微生盡戀人間樂只有襄王憶夢中龍池龍池賜酒敞雲屏羯鼓聲髙衆樂停夜半宴歸宫漏永薛王沉醉夀王醒嫦娥雲母屏風燭影深長河漸落曉星沉嫦娥應悔偷靈藥碧海青天夜夜心憶住一師無事經年别逺公帝城鐘曉憶西峰爐煙銷盡寒燈晦童子開門雪滿松寄蜀客君到臨卭問酒壚近來還有長卿無金徽却是無情物不許文君憶故夫賈生宣室求賢訪逐臣賈生才調更無倫可憐夜半虛前席不問蒼生問鬼神溫庭筠贈少年江海相逢客恨多秋風葉下洞庭波酒酣夜别淮陰市月照髙樓一曲歌贈彈箏人天寶年中事玉皇曽將新曲教寧王鈿蟬金雁皆零落一曲伊州淚萬行瑶瑟怨氷簟銀牀夢不成碧天如水夜雲輕雁聲逺過瀟湘去十二樓中月自明春日雨細雨濛濛入絳紗湖亭寒食孟珠家南朝漫自稱流品宫體何曾為杏花過吳景帝陵王氣銷來水渺茫豈能才與命相妨虛開直瀆三千里青蓋何曾到洛陽贈鄭徴君一拋蘭棹逐燕鴻曾向江湖識謝公每到朱門還悵望故山多在畫屛中車駕西遊因而有作宣曲長楊瑞氣凝上林狐兔待秋鷹誰將詞賦陪雕輦寂寞相如卧茂陵題端正樹路傍佳樹碧雲愁曾侍金輿幸驛樓草木榮枯似人事緑隂寂寞漢陵秋經故翰林袁學士居劒逐驚波玉委塵謝安門下更何人西州城外花千樹盡是羊曇醉後春河中紫極宫昔年曾伴玉真遊每到仙宫即是秋曼倩不歸花落盡滿叢煙露月當樓夜看牡丹髙低深淺一闌紅把火殷勤照露叢希逸近來成懶病不能容易向春風題分水嶺溪水無情似有情入山三日得同行嶺頭便是分頭處惜别潺湲一夜聲鄠杜郊居槿籬芳援近樵家壠麥青青一徑斜寂寞遊人寒食後夜來風雨送梨花咸陽值雨成陽橋上雨如懸萬點空濛隔釣船還似洞庭春水色曉雲將入嶽陽天南歌子詞井底點燈深燭伊共郎長行莫圍棊玲瓏骰子安紅豆入骨相思知不知段成式觀棊間對文楸傾一壺黃羊枰上幾成都他時謁帝銅池曉便賭宣城太守無寄溫飛卿箋紙三十六鱗充使時數畨猶得裹相思待將袍襖重鈔了盡寫襄陽播掿詞嘲飛卿醉袂幾侵魚子纈飄纓長罥鳳凰叉知君欲作間情賦應願將身作錦鞋柳煙梅雪隱青樓殘日黃鸝語未休見説自能裁袙腹不知誰更著帩頭柔卿解籍戲呈飛卿長簷犢車初入門金牙新醖盈深尊良人為漬木瓜粉遮却紅腮交午痕出意挑鬟一尺長金為鈿鳥簇叉梁鬱金種得花茸細添入春衫領裏香戲髙侍御三首七尺髮猶三角梳玳牛獨駕長簷車曾城自有三青鳥不要蓮東雙鯉魚别起青樓作幾層斜陽慢卷鹿盧繩厭裁魚子深紅纈泥覔蜻蜓淺碧綾可羡羅敷自有夫愁中漫捋白髭鬚豹錢驄子能擎舉兼著連乾許換無許渾寄桐江隱者潮去潮來洲渚春山花如繡草如茵嚴陵臺下桐江水解釣鱸魚有幾人謝亭送别勞歌一曲解行舟紅葉青山水急流日暮酒醒人已逺滿天風雨下西樓下第懷友人獨掩衡門花落時一封書信緩歸期南宗更有瀟湘客夜夜月明聞竹枝題段太尉廟靜想追兵緩翠華古碑荒廟閉松花紀生不向滎陽死爭有山河屬漢家經秦皇墓龍盤虎踞樹層層勢入浮雲亦是崩一種青山秋草裏行人惟拜漢文陵過湘妃廟古木蒼山掩翠蛾月明南浦起微波九疑望斷幾千載斑竹淚痕今更多送宋處士歸山賣藥修琴歸去遲山風吹盡桂花枝世間甲子須臾事逢著仙人莫看棊秦樓曲秦女夢餘仙路遙月窗風簟夜迢迢潘郎翠鳳雙飛去三十六宫聞玉簫楚宫怨十二峰晴花盡開楚宫雙闕對陽臺細腰爭舞君王醉白日秦兵天上來聽唱山鷓鴣金谷歌傳第一流鷓鴣清怨碧煙愁夜來省得曾聞處萬里月明湘水秋學仙心期仙訣意無窮采畫雲車起夀宫聞有三山未知處茂陵松柏滿西風紫藤緑蔓穠隂紫袖低客來留坐小堂西醉中掩瑟無人會家近江南罨畫溪趙嘏烏栖曲宫烏栖處玉樓深微月生簷夜夜心香輦不回花自落春來空佩辟寒金宛陵望月寄沈學士一川如畫敬亭東待詔間逰處處同天竺山前鏡湖畔何如今日庾樓中翡翠巖芙蓉幕裏千場醉翡翠巖前半日間惆悵晉朝人不到謝公拋力上東山經汾陽舊宅門前不改舊山河破虜曽經馬伏波今日獨經歌舞地古槐疏冷夕陽多寄盧中丞葉覆清溪􅗷􅗷紅路橫秋色馬嘶風獨攜一榼郡齋酒吟對青山憶謝公尋僧溪户無人谷鳥飛石橋橫木挂禪衣看雲日暮倚松立野水亂鳴僧未歸西江晚泊茫茫藹藹失西東柳浦桑村處處同戍鼓一聲帆影盡水禽飛起夕陽中江樓感舊獨上江樓思渺然月光如水水如天同來望月人何處風景依稀似去年送從翁中丞奉使黠戛斯旌旗杳杳雁蕭蕭春盡窮沙雪未消料得堅昆受宣後始知公主已歸朝寄逺禁鐘聲盡見棲禽關塞迢逮故國心無限春愁莫相問落花流水洞房深聽琴抱琴花夜不勝春獨奏相思淚滿巾第五指中心最恨數聲嗚咽為何人盧弼邊庭四時怨朔風吹雪透刀瘢飲馬長城窟更寒夜半火來知有敵一時齊保賀蘭山皇甫松浪淘沙詞蠻歌豆䓻北人愁松雨蒲風野艇秋浪起鵁鶄眠不得寒沙細細入江流劉皂長門怨蟬鬢慵梳倚帳門蛾眉不掃慣承恩傍人未必知心事一面殘妝空淚痕馬戴送友人遊邊有客新從絶塞回自言曽上李陵臺尊前話盡北風起秋色蕭條胡雁來薛能折楊柳洛橋晴影覆江船羌笛秋聲溼塞煙間想習池公宴罷水蒲風絮夕陽天吳姬身是三千第一名內家叢裏獨分明芙蓉殿上中元日水拍銀盆弄化生鄭畋初秋寓直曉星猶挂結璘樓三殿風髙藥樹秋玉笛數聲飄不住間人依約在東頭馬嵬坡玄宗回馬楊妃死雲雨難忘日月新終是聖明天子事景陽宫井又何人崔珏席上贈琴客七條弦上五音寒此藝知音自古難唯有開元房太尉始終憐得董庭蘭唐人萬首絶句選卷六
