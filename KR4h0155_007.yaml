body:
  text: 唐人萬首絶句選卷七宋洪邁元本刑部尚書王士禎選七言五陸龜䝉石竹花曽看南朝畫國娃古羅衣上碎明霞而今莫共金錢鬬買却春風是此花送棊客滿目山川似勢棊况當秋雁正斜飛金門若召羊𤣥保賭取江東太守歸鄴宫詞花飛蝶駭不愁人水殿雲廊别置春曉日靚妝千騎女白櫻桃下紫綸巾懷宛陵舊游陵陽佳地昔年游謝朓青山李白樓唯有日斜溪上思酒旗風影落春流白蓮素花多蒙别豓欺此花真合在瑶池無情有恨何人見月曉風清欲墮時後池曉烟清露暗相和浴雁浮鷗意緒多却是陳王詞賦錯枉將心事託微波初冬偶作桐下空階叠緑錢貂裘初綻擁髙眠小爐低幌還遮掩酒滴灰香似去年簾枕映疏容晚向欹秋烟脈脈雨微微逆風障燕尋常事不學人前當妓衣祕色越器九秋風露越窰開奪得千峰翠色來好向中宵盛沆瀣共嵇中散鬭遺杯木蘭花或作李商隱洞庭波浪渺無津日日征帆送逺人幾度木蘭舟上望不知元是此花身皮日休重臺荷花欹紅婑媠力難任每葉頭邊半米金可得教他水妃見兩重原是一重心松江早春松陵清淨雪消初見底新安恐未如穩憑船舷無一事分明數得鱠殘魚病酒鬱林步障晝遮明一炷濃香養病酲何事晚來還欲飲隔牆聞賣蛤蜊聲玩金鸂鶒鏤羽雕毛迥出羣溫黁飄出麝臍熏夜來曽吐紅茵畔猶自溪邊睡不聞李訥聽盛小叢歌贈崔侍御繡衣奔命去情多南國佳人斂翠蛾曽向教坊聽國樂為君重唱盛叢歌髙湘奉和謝安春渚餞袁宏千里仁風一扇清歌黛慘時方酩酊不知公子重飛觥盧溵奉和烏臺上客紫髯公共捧天書靜鏡中桃葉不須歌白苧耶溪暮雨起樵風鄭谷淮上與友人别揚子江頭楊栁春楊花愁殺渡江人數聲風笛離亭晚君向瀟湘我向秦席上贈歌者花月樓臺近九衢清歌一曲倒金壺坐中亦有江南客莫向春風唱鷓鴣吳融閿鄉卜居六載抽毫侍禁闈不堪多病决然歸五陵年少如相問阿對泉頭一布衣楚事悲秋應亦抵傷春屈宋當年並楚臣何事從來好時節只將惆悵付詞人髙蟾金陵晚望曽伴浮雲歸晚翠猶陪落日泛秋聲世間無限丹青手一片傷心畫不成馬逢從軍漢馬千蹄合一羣單于鼓角隔山聞沙塠風起紅樓下飛上胡天作陳雲宫詞玉樓天半起笙歌風送宫人笑語和月殿影開聞曉漏水精簾捲近秋河孟遲過驪山冷日微烟渭上愁華清宫樹不勝秋霓裳一曲千門鎖白盡梨園子弟頭崔櫓華清宫二首草遮回磴絶鳴鑾雲樹深深碧殿寒明月自來還自去更無人倚玉闌干門橫金銷悄無人落日秋聲渭水濵紅葉下山寒寂寂溼雲如夢雨如塵王貞白折楊柳枝枝交影鎖長門嫩色曽沾雨露恩鳳輦不來春欲盡空留鶯語到黃昏劉言史泊花石浦舊業叢臺廢苑東幾年為梗復為蓬杜鵑啼斷還家夢半在邯鄲驛樹中宋雍春日輕花細葉滿林端昨夜春風曉色寒黃鳥不堪愁裏聽緑楊宜向雨中看李郢送李判官津市停橈送别難熒熒蠟炬照更闌東風萬疊吹江月誰伴袁褒宿夜灘宿杭州虛白堂秋月斜明虛白堂寒蛩唧唧樹蒼蒼江風徹曉不得睡二十五聲秋㸃長裴夷直贈美人琴絃應從玉指到金徽萬態千情料可知今夜燈前湘水怨殷勤封在七條絲儲嗣宗小樓松杉風外亂山青曲几焚香對石屏空憶去年春雨後燕泥時汚太𤣥經月夜雁池衰草露沾衣河水東流萬事微寂寞青陵臺上月秋風滿樹鵲南飛羅鄴放鷓鴣好倚青山與碧溪刺桐毛竹待雙棲花時遷客傷離别莫向相思樹上啼秋怨夢斷南窗啼曉烏新霜昨夜下庭梧不知簾外如規月還照邊城到曉無羅虬比紅兒詩十二首陷却平陽為小憐周師百萬戰長川更教乞與紅兒貌舉國山河不直錢一曲都緣張麗華六宫齊唱後庭花若教比並紅兒貌枉破當時國與家樂營門外柳如隂中有佳人畫閣深若使五陵公子見買時應不惜千金詔下人間選好花月眉雲髻盡名家紅兒若向當時見繫臂先封第一紗拔得芙蓉出水新魏家公子信才人若教瞥見紅兒貌不肯留情賦洛神樹裊西風日半沉地無人迹轉傷心阿嬌得似紅兒貌不費長門買賦金薄羅輕翦越溪紋鴉翅低從兩鬢分料得相如偷見面不應琴裏挑文君鸚鵡蛾如裛露紅鏡前眉樣自深宫稍教得似紅兒貌不嫁南朝沈侍中青史書來未是真可知纖智却狂秦再三為謝齊王后要解連環别與人蘇小輕勻一面妝便留名字著錢塘藏鴉門外諸年少不識紅兒未是狂天碧輕紗只六銖宛風含露透肌膚便教漢曲爭明媚應沒心情更弄珠金粟妝成扼臂環舞腰輕轉瑞雲間紅兒生在開元末羞殺新豐謝阿蠻羅隱煬帝陵入郭登橋出郭船紅樓日日栁年年君王忍把平陳業只換雷塘數畝田司空圖有感國事皆須救未然漢家髙閣漫凌烟功臣盡遣詞人贊不省滄洲畫魯連華下故國春歸未有涯小䦨髙檻别人家五更惆悵回孤枕猶有殘燈照落花狂題别鶴凄凉指法存戴逵能恥近王門世間第一風流事借得王公玉枕痕韓偓聞雨香侵蔽膝夜寒輕聞雨傷春夢不成羅帳四垂紅燭背玉叉敲著枕函聲巳凉碧䦨干外繡簾垂猩色屛風畫折枝八尺龍鬚方錦褥巳凉天氣未寒時遙見悲歌淚溼淡燕脂閒立風吹金縷衣白玉堂東遙見後令人評泊畫楊妃寒食夜側側輕寒翦翦風杏花飄雪小桃紅夜深斜搭秋千索樓閣朦朧細雨中新上頭學梳蟬鬢試新裙消息佳期在此春為愛好多心轉惑遍將宜稱問傍人閨怨時光潜去暗凄凉懶對菱花暈曉妝初折秋千人寂寞後園青草任他長深院鵝兒唼喋梔黃觜鳳子輕盈膩粉腰深院下簾人晝寢紅薔薇映碧芭蕉寄鄰莊道侣聞說經旬不啓關藥窗誰伴醉開顔夜來雪壓村前竹剩見溪南幾尺山劉駕長門怨御泉長繞鳯皇樓只是恩波别處流閒揲舞衣歸未得夜來砧杵六宫秋崔塗湘中謡烟愁雨細雲冥冥杜蘭香老三湘清故山望斷不知處鶗鴂隔花時一聲讀漢武內傳分明三鳥下儲胥一覺鈞天夢不如無那白頭方士到茂陵紅樹巳蕭疏夷陵夜泊家依楚塞窮秋别身逐孤舟萬里行一曲巴歌半江月便應消得二毛生司馬札宫怨栁色參差掩畫樓曉鶯啼送滿宫愁年年花落無人見空逐春泉出御溝冷朝光越溪怨越王宫裏如花人越水溪頭采白蘋白蘋未盡人先盡誰見江南春復春陳陶閒居雜興越里姓童錦作襦豔歌聲壓郢中姝無人說向張京兆一曲江南十斛珠隴西行誓掃胸奴不顧身五千貂錦喪胡塵可憐無定河邊骨猶是春閨夢裏人王偃夜夜曲北斗星移銀漢低班姬愁思鳳城西青槐陌上人行絶明月樓前烏夜啼崔道融羯鼓華清宫裏打撩聲供奉絲簧束手聽寂寞鑾輿斜谷裏是誰翻得雨淋鈴梅溪上寒梅初滿枝夜來霜月透芳菲清光寂寞思無盡應待琴尊與解圍酒醒酒醒撥剔殘灰火多少凄凉在此中爐畔自斟還自醉竹窗深夜雪兼風韋莊鄜州寒食三首滿街楊柳緑絲烟畫出清明二月天好是隔簾花樹動女郎撩亂送鞦韆開元坡下日初斜拜掃歸來走鈿車可惜數枝紅艷好不知今夜落誰家雨絲烟柳欲清明金屋人閒暖鳳笙永晝迢迢無一事隔牆聞蹴氣毬聲江行西望西望長安白日遙半年無事駐蘭橈欲將張翰松江雨畫作屏風寄鮑昭古離别二首晴烟漠漠栁毶毶不那離情酒半酣更把玉鞭雲外指斷腸春色在江南一生風月供惆悵到處烟花恨别離至竟多情何處好少年長抱長年悲金陵圖二首誰為傷心畫不成畫人心逐世人情君看六幅南朝事老木寒雲滿故城江雨霏霏江草齊六朝如夢鳥空啼無情最是臺城柳依舊烟籠十里隄孫光憲竹枝門前春水白蘋花岸上無人小艇斜商女經過江欲暮散拋殘食飼神鴉楊柳枝閶門風暖落花乾飛遍江城雪不寒獨有晚來臨水驛閒人多憑赤䦨干王渙惆悵詞七首李夫人病巳經秋漢武看來不舉頭所得穠華消歇盡楚魂湘血一生休隋師戰艦欲亡陳國破應難保此身訣别徐郎淚如雨鑑鸞分後屬何人嗚咽離聲管吹秋妾身今日為君休齊奴不說平生事忍看花枝謝玉樓七夕瓊筵往事陳兼花連蒂共傷神蜀王殿裏三更月不見驪山私語人陳宫興廢事難期三閣空餘緑草基狎客淪亡麗華死他年江令獨來時少卿降北子卿還朔野離觴慘别顔却到茂陵惟一慟節毛零落鬢毛斑夢裏分明入漢宫覺來燈背錦屏空紫臺月落關山曉腸斷君恩信畫工杜荀鶴新雁暮天新雁起汀洲紅蓼花疏水國秋想得故園今夜月幾人相憶在江樓張泌惜花蝶散鶯啼尚數枝日斜風定更離披看多記得傷心事金谷樓前垂地時寄人二首别夢依依到謝家小廊回合曲䦨斜多情只有春庭月猶為離人照落花酷憐風月為多情還到春時别恨生倚柱尋思倍惆悵一場春夢不分明李九齡山中寄友人亂雲堆裏結茅廬巳共紅塵跡漸疏莫問野人生計事窗前流水枕前書蔣吉旅泊霜月初髙鸚鵡洲美人清唱發紅樓鄉心暗逐秋江水直到吳山腳下流孫元晏庾信苦心詞賦為誰談淪落咸陽志豈甘可惜多才庾開府一生惆悵憶江南馬彧贈韓定辭燧林芳草綿綿思盡日相攜陟麗譙别後巏􅭴山上望羡君時復見王喬巏􅭴讀如權旄詳顔氏家訓韓定辭酬馬彧崇霞臺上神仙客學辨癡龍藝最多盛德好將銀筆述麗詞堪與雪兒歌開元名公裴給事宅白牡丹長安豪貴惜春殘爭賞新開紫牡丹别有玉盤承露冷無人起就月中看韋氏子悼亡妓惆悵金泥簇蝶裙春來猶見伴行雲不教布施剛留得恰似相逢李少君君山父老閒吟湘中老人讀黃老手援紫藟坐碧草春至不知湘水深日暮忘却巴陵道釋皎然青陽上人院君說南朝全盛日秣陵才子最多人千年秋色古池館誰見齊王西邸春釋清塞憶潯陽舊居兼贈長孫郎中潯陽却到知何日此地今無舊使君長憶窮冬宿廬嶽瀑泉氷折共僧聞釋無本行次漢上習家池沼草萋萋嵐樹光中信馬蹄漢主廟前湘水碧一聲風角夕陽低梅妃謝賜珍珠桂葉雙眉久不描殘妝和淚汚紅綃長門盡日無梳洗何必真珠慰寂寥杜秋娘所歌金縷曲勸君莫惜金縷衣勸君須惜少年時有花堪折直須折莫待無花空折枝魚𤣥機送盧員外玉壘山前風雪夜錦官城北别離魂信陵公子如相問長向夷門感舊恩薛濤送友人水國蒹葭夜有霜月寒山色共蒼蒼誰言千里自今夕離夢杳如關塞長竹郎廟竹郎廟前多古木夕陽沈沈山更緑何處江村有笛聲聲聲盡是迎郎曲武昌妓續韋蟾句悲莫悲兮生别離登山臨水送將歸武昌無限新栽柳不見楊花撲面飛湘妃廟女子無題二首碧杜紅蘅縹眇香氷絲彈月弄新凉峰巒一一渾相似九處堪疑九斷腸少將風月怨平湖見盡扶桑水到枯相約杏花壇上去畫䦨紅子鬬摴蒲桐廬神與徐兵曹酬獻忽然湖上片雲飛不覺舟中雨溼衣折得荷花渾忘却空將荷葉蓋頭歸甘棠叟無題春草萋萋春水緑野棠開盡飄香玉繡嶺宫前鶴髮人猶唱開元太平曲襄州舉人無題流水㳙㳙芹努芽織烏西飛客還家荒村無人作寒食殯宫空對棠梨花天竺牧童别李源身前身後事茫茫欲話因緣恐斷腸吳越山川尋巳遍却回烟棹上瞿唐屏上美人春陽曲長安少女踏春陽何處春陽不斷腸舞袖弓彎渾忘却羅幃空度九秋霜樂府辭蓋嘉運進涼州歌朔風吹葉雁門秋萬里烟塵昏戍樓征馬長嘶青海北胡笳夜聽隴山頭突厥三臺雁門山上雁初飛馬邑欄中馬正肥昨日山西逢驛使殷勤南北送征衣蘆中集讀庾信集四朝十帝盡風流建業長安兩醉游唯有一篇楊柳曲江南江北為君愁初過漢江襄陽好向峴亭看人物蕭條值嵗䦨為報習家多置酒夜來風雪過江寒無名氏雜詩近寒食雨草萋萋著麥苗風栁映堤等是有家歸未得杜鵑休向耳邊啼浙江輕浪古悠悠望海樓吹望海愁莫怪鄉心隨魄斷十年為客在他州無定河邊暮笛聲赫連臺畔旅人情函關歸路千餘里一夕秋風白髮生花落長川草色青暮山重疊雨冥冥逢春便覺飄蓬苦今日分飛一涕零唐人萬首絶句選卷七
