body:
  text: 唐人萬首絶句選卷五宋洪邁元本刑部尚書王士禎選七言三李賀南園二首長卿牢落悲空舍曼倩詼諧取自容見買若耶溪水劒明朝歸去事猿公尋章摘句老雕蟲曉月當簾挂玉弓不見年年遼海上文章何處哭秋風昌谷北園新筍斫取青光寫楚辭膩香春粉黑離離無情有恨何人見露壓煙啼千萬枝酬答雍州二月海池春御水鵁鶄暖白蘋試問酒旗歌板地今朝誰是拗花人吕溫劉郎浦吳蜀成婚此水潯明珠步障幄黃金誰將一女輕天下欲换劉郎鼎峙心楊巨源僧院聽琴禪思何妨在玉琴真僧不見聽時心離聲怨調秋堂夕雲向蒼梧湘水深贈崔駙馬百尺梧桐畫閣齊簫聲落處彩雲低平陽不惜黃金埒細雨花驄踏作泥聽李憑彈箜篌聽奏繁弦玉殿清風傳曲度禁林明君王聽樂梨園暖翻到雲門第幾聲觀妓人入道荀令歌鐘北里亭翠蛾紅粉敝雲屏舞衣施盡餘香在今日花前學誦經盧同逢鄭三遊山相逢之處花茸茸石壁攢峰千萬重他日期君何處好寒流石上一株松王涯從軍詞旄頭夜落捷書飛來奏金門著賜衣白馬將軍頻破敵黃龍戍卒幾時歸塞下曲年少辭家從冠軍金鞍寶劒去邀勳不知馬骨傷寒水唯見龍城起暮雲秋夜曲桂魄初生秋露微輕羅己薄未更衣銀筝夜久殷勤弄心怯空房不忍歸宫詞二首一叢髙鬢緑雲光官樣輕輕淡淡黃為看九天公主貴外邊爭學內家妝炎炎夏日滿天時桐葉交加覆玉墀向晚移鐙上銀簟業叢緑鬢坐彈棊令狐楚少年行家本清河住五城須憑弓箭得功名等間飛鞚秋原上獨向寒雲試射聲舒元輿贈潭州李尚書湘江舞罷忽成悲便脫蠻鞾出絳帷誰是蔡雍琴酒客魏公懷舊嫁文姬張仲素塞下曲四首三戍漁陽再渡遼騂弓在臂劍橫腰胸奴似欲知名姓休傍隂山更射雕獵馬千行雁幾雙燕然山下碧油幢傳聲漠北單于破火照旌旗夜受降朔雪飄飄開雁門平沙厯亂轉蓬根功名恥記擒生數直斬樓蘭報國恩隂磧茫茫塞草肥􅥱橰峰上暮雲飛交河北望天連海蘇武曽持漢節歸秋閨思二首碧窗斜日藹深暉愁聽寒螀淚溼衣夢裏分明見關塞不知何路向金微秋天一夜靜無雲斷續鴻聲到曉聞欲寄征人問消息居延城外又移軍漢苑行春風淡蕩景悠悠鶯囀髙枝燕入樓千步回廊聞鳳吹珠簾處處上銀鉤天馬詞蹀躞宛駒齒未齊摐金噴玉向風嘶來時行盡金河道獵獵輕風在碧蹄張籍送蜀客蜀客南行祭碧雞木棉花發錦江西山橋日晚行人少時有猩猩樹上啼蠻中銅柱南邊毒草春行人幾日到金潾玉鐶穿耳誰家女自抱琵琶迎海神蠻州瘴水蠻中入洞流人家多住竹棚頭青山海上無城郭唯見松牌記象州哭孟寂曲江院裏題名處十九人中最少年今日春光君不見杏花零落寺門前法雄寺東樓汾陽舊宅今為寺猶有當時歌舞樓四十年來車馬散古槐深巷暮蟬愁秋思洛陽城裏見秋風欲作家書意萬重復恐匆匆説不盡行人臨發又開封涼州詞二首邊城暮雨雁飛低蘆筍初生漸欲齊無數鈴聲遙過磧應馱白練到安西鳯林關裏水東流白草黃榆六十秋邊將皆承主恩澤無人解道取涼州宫詞二首新鷹初放兔猶肥白日君王在內稀薄暮千門臨欲鎖紅妝飛騎向前歸黃金捍撥紫檀槽絃索初張調更髙盡理昨來新上曲內官簾外送櫻桃寄李渤五度溪頭躑躅紅嵩陽寺裏講時鐘春山處處行應好一月看花到幾峰春别曲長江春水緑堪染蓮葉出水大如錢江頭橘樹君自種那不長繫木蘭船寒塘曲寒塘沉沉栁葉疏水暗人語驚栖鳬舟中少年醉不起持燭照水射遊魚王建江陵使至汝州回看巴路在雲間寒食離家麥熟還日暮數峰青似染商人説是汝州山華清宫酒幔髙樓一百家宫前楊栁寺前花內園分得溫湯水二月中旬巳進瓜十五夜望月中庭地白樹栖鴉冷露無聲溼桂花今夜月明人盡望不知秋思在誰家霓裳詞四首弟子部中留一色聽風聽水作霓裳散聲未足重來授直到牀前見上皇自直梨園得出稀更畨上曲不教歸一時跪拜霓裳徹立地階前賜紫衣旋翻曲譜聲初足除在梨園未教人宣與書家分手寫中官走馬賜功臣傳呼法部按霓裳新得承恩别作行日晚貴妃樓上看內人舁下綺羅箱宫詞二十四首羅衫葉葉繡重重金鳯銀鵝各一叢每遍舞時分兩向太平萬嵗字當中魚藻池中鎖翠娥先皇行處不曾過如今池底休鋪錦菱角雞頭積漸多內人相續報花開準擬君王便看來逢著五弦紅繡袋宜春院裏按歌回太儀前日暖房來囑向昭陽乞藥栽敕賜一窠紅躑躅謝恩未了奏花開御前新賜紫羅襦不下金階上軟輿宫局總來為喜樂院中新拜內尚書日冷天晴近臘時玉階金瓦雪離離浴堂門外抄名入公主家人謝面脂未承恩澤一家愁乍到宫中憶外頭求守管弦聲款逐側商調裏唱伊州東風潑火雨新休舁盡春泥掃雪溝走馬犢車當御路漢陽公主進雞毬金吾除夜進儺名畫袴朱衣四隊行院院燒燈如白日沉香火底坐吹笙避暑昭陽不擲盧井邊含水噴鴉雛內中數日無呼唤榻得滕王蛺蝶圖延英引對碧衣郎江硯宣毫各别牀天子下簾親考試宫人手裏過茶湯新調白馬伯鞭聲供奉騎來繞殿行先報諸王侵早入隔門催進打毬名對御難爭第一籌殿前不打背身毬內人唱好龜兹急天子捎回過玉樓城東北面望雲樓半下珠簾半上鈎騎馬行人長速過恐防天子在樓頭射生宫女宿紅妝把得新弓各自張臨上馬時齊賜酒男兒跪拜謝君王紅蠻捍撥貼胸前移坐當頭近御筵用力獨彈金殿響鳯皇飛出四條弦家常愛著舊衣裳空插紅梳不作妝忽地下階裙帶解非時應得見君王琵琶先抹緑腰頭小管丁寧側調愁半夜美人雙起唱一聲聲出鳳皇樓春池日暖少風波花裏牽船水上歌遙索劍南新樣錦東宫先釣得魚多彈棊玉指兩參差背局臨虛鬭著危先打角頭紅子落上三金字半邊垂業叢洗手繞金盆旋拭紅巾入殿門衆裏遙拋金橘子在前收得便承恩宿妝殘粉未明天總立昭陽花樹邊寒食內人長白打庫家先散與金錢蓬萊正殿壓雲鼇紅日初生碧海濤開著五門遙北望柘黃新御牀髙下浪切移來女樂部頭邊新賜花檀木五弦緶得紅羅手帕子當中更畫一雙蟬鮑防上巳寄孟中丞世間褉事風流處鏡裏雲山若畫屏今日會稽王內史好將賓客醉蘭亭竇牟奉誠園聞笛曽絶朱纓吐錦茵欲披荒草訪遺塵秋風忽灑西園淚滿目山陽笛裏人竇庠陪留守內巡至上陽宫感興愁雲漠漠草離離太液鉤陳處處疑薄暮毁垣春雨裏殘花猶發萬年枝竇鞏襄陽寒食寄宇文籍煙水初銷見萬家東風吹柳萬條斜大隄欲上誰相伴馬踏春泥半是花洛中即事髙梧葉盡鳥巢空洛水潺湲夕照中寂寂天橋車馬絶寒鴉飛入上陽宫寄南遊兄弟書來未報幾時還知在三湘五嶺間獨立衡門秋水濶寒鴉飛去日沉山宫人斜離宫路逺北原斜生死深恩不到家雲雨今歸何處去黃鸝飛上野棠花南遊感興傷心欲問前朝事惟見江流去不回日暮東風春草緑鷓鴣飛上越王臺楊憑雨中怨秋辭家逺客愴秋風千里寒雲與斷蓬日暮隔山投古寺鐘聲何處雨濛濛送客往荆州巴丘過日暮登城雲水湘東一色平若愛春秋繁露學正逢元凱鎮南荆楊凝初次巴陵西江浪接洞庭波積水遙連天上河鄉信為憑誰寄去汀州燕雁漸來多送客入蜀劒閣迢迢夢想間行人歸路繞梁山明朝騎馬搖鞭去秋雨槐花子午關楊凌早春雪中新年雨雪少晴時屢失尋梅問栁期鄉信憶隨回雁早江春寒帶故隂遲明妃曲漢國明妃去不還馬馱弦管向隂山匣中縱有菱花鏡羞向單于照舊顔賈島渡桑乾客舍并州巳十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉宿林家亭子牀頭枕是溪中石井底泉通竹下池宿客未眠過夜半獨聞山雨到來時贈人斑竹拄杖揀得林中最細枝結根石上長身遲莫嫌滴瀝紅斑少恰是湘妃淚盡時張枯千秋樂八月平時花萼樓萬方同樂是千秋傾城人看長竿出一技初成趙解愁春鶯囀興慶池南栁未開太真先把一枝梅內人巳唱春驚囀花下傞傞軟舞來邠王小管虢國潛行韓國隨宜春深院映花枝金輿逺幸無人見偷把邠王小管吹孟才人偶因歌態詠嬌嚬傳唱宫中十二春却為一聲河滿子下泉須弔孟才人折楊栁凝碧池邊斂翠眉景陽樓下綰青絲那勝妃子朝元閣玉手和煙弄一枝華清宫二首天闕沉沉夜未央碧雲仙曲舞霓裳一聲玉笛向空盡月滿驪山宫漏長紅樹蕭蕭閣半開上皇曽幸此宫來至今風俗驪山下村笛猶吹阿濫堆集靈臺二首日光斜照集靈臺紅樹花迎曉露開昨夜上皇新授籙太真含笑入簾來虢國夫人承主恩平明騎馬入公門却嫌脂粉汚顔色淡掃蛾睂朝至尊阿鴇湯月照宫城紅樹芳緑窗燈影在雕梁金輿未到長生殿妃子偷尋阿鴇湯雨霖鈴雨霖鈴夜却歸秦猶見張徽一曲新長説上皇和淚教月明南內更無人宿盆浦逢崔升江流不動月西沉南北行人萬里心况是相逢雁天夕星河寥落水雲深聽筝十指纖纖玉筍紅雁行輕過翠絃中分明似説長城苦水咽雲寒一夜風楚州韋中丞箜篌千重鈎鎖撼金鈴萬顆真珠瀉玉瓶恰值滿堂人欲醉甲光才觸一時醒金陵渡金陵津渡小山樓一宿行人自欲愁潮落夜江斜月裏兩三星火是瓜洲遊淮南十里長街市井連月明橋上看神仙人生只合揚州死禪智山光好墓田徐凝漢宫曲水色簾前流玉霜趙家飛燕侍昭陽掌中舞罷簫聲絶三十六宫秋夜長憶揚州蕭娘臉下難勝淚桃葉睂頭易得愁天下三分明月夜二分無賴是揚州唐彥謙穆天子傳王母清歌玉琯悲瑶臺應有再來期穆王不得重相見恐為無端哭盛姬楚天楚天遙望每長嚬宋玉襄王盡作塵不會瑶姬朝與暮更為雲雨待何人寄徐山人一室清羸鶴體孤體和神瑩爽冰壺吳中髙士雖求死不那稽山有謝敷垂栁絆惹春風别有情世間誰敢鬭輕盈楚王江畔無端種餓損纖腰學不成鄧艾廟昭烈遺黎死尚羞揮刀斫石恨譙周如何千載留遺廟血食巴山伴武侯曲江春望杏艷桃光奪晚霞樂逰無廟有年華漢朝冠蓋皆陵墓十里宜春下苑花落花紛紛從此見花殘轉覺長繩繫日難樓上有愁春不淺小桃風雪憑闌干仲山千載遺蹤寄薜蘿沛中鄉里漢山河長陵亦是間丘隴異日誰知與仲多洛神人世仙家本自殊何須相見向中途驚鴻瞥過遊龍去漫惱陳王一事無長安秋望栁短莎長溪水流雨微煙暝立溪頭寒鴉閃閃前山去杜曲黃昏獨自愁裴交泰長門怨自閉長門經幾秋羅衣溼盡淚還流一種蛾眉明月夜南宫歌管北宫愁羊士諤望女几山女几山頭春雪消路傍仙杏發柔條心期欲去知何日惆悵回車上野橋登樓槐栁蕭疏繞郡城夜添山雨作江聲秋風南陌無車馬獨上髙樓故國情憶江南舊遊山隂道上桂花初王謝風流滿晉書會作江南部從事秋來還復憶鱸魚郡中紅衣落盡暗香殘葉上秋光白露寒越女含情巳無限莫教長袖倚闌干泛舟後溪雨餘芳草淨沙塵水緑灘平一帶春唯有啼鵑似留客桃花深處更無人盧隱雨霽登北原稻黃撲撲黍油油野樹連山澗自流憶得年時馮翊部謝郎相引上樓頭朱慶餘宫中詞寂寂花時閉院門美人相並立瓊軒含情欲説宫中事鸚鵡前頭不敢言劉商題黃陂夫人祠蒼山雲雨逐明神唯有香名嵗嵗春東風三月黃陂水只見桃花不見人題潘師房渡水傍山尋絶壁白雲飛處洞門開仙人來往行無迹石徑春風長緑苔錢珝春恨負罪將軍在北朝秦淮芳草緑迢迢髙臺愛妾魂銷盡憑仗丘遲為一招李羣玉寄友野水晴山雪後時獨行村路更相思無因一向溪頭醉處處寒梅映酒旗漢陽太白樓江上晴樓翠靄間滿簾春水滿窗山青楓緑草將愁去逺入吳雲暝不還南莊春曉草暖沙長望去舟微茫煙浪向巴丘沅湘寂寂春歸盡水緑蘋香人自愁黃陵廟黃陵廟前莎草春黃陵女兒茜裙新輕舟小楫唱歌去水逺山長愁殺人題王侍御宅門向滄江碧嶂開地多鷗鷺少塵埃緑隂十里灘聲裏間去王家看竹來殷堯藩贈歌人郭婉石家金谷舊歌人起唱花筵淚滿巾紅粉少年諸弟子一時怊帳望梁塵鮑溶隋宫柳塘煙起日西斜竹浦風回雁弄沙煬帝春遊古城在壞宫芳草滿人家贈楊錬師二首紫煙衣上繡春雲清隱山書小篆文明月在天將鳯管夜深吹向玉宸君道士夜誦蘂珠經白鶴下繞香煙聽夜移經盡人上鶴天風吹入秋冥冥漢宫詞月映東窗似玉輪未央前殿絶聲塵宫槐花落西風起鸚鵡驚寒夜喚人繁知一題巫山廟忠州刺史今才子行到巫山定有詩為報髙唐神女道早排雲雨候清辭薛宜僚别妓段東美阿母桃花方似錦王孫芳草正如煙不須更向滄溟望惆悵歡情恰一年嚴休復聞玉蕊院真人降羽車潛下玉龜山塵世何由覩蕣顔唯有無情枝上雪好風吹綴緑雲鬟陳羽吳中覽古吳王舊國水煙空香徑無人蘭葉紅春色似憐歌舞地年年先發館娃宫將歸舊山留别相共逰梁今獨還異鄉搖落憶青山信陵死後無公子徒向夷門學抱關湘君祠二妃哭處湘江深二妃愁處雲沉沉商人酒滴廟前草蕭颯風生斑竹林襄陽過孟子舊居襄陽城郭春風裏漢水東流去不還孟子死來江樹老煙霞猶在鹿門山唐人萬首絶句選卷五
