body:
  text: 唐人萬首絶句選巻二宋洪邁元本刑部尚書王士禎選五言二李益江南曲嫁得瞿唐賈朝朝誤妾期早知潮有信嫁與弄潮兒贈盧綸世故中年别餘生此㑹同却將悲與病獨對朗陵翁鷓鴣詞湘江斑竹枝錦翅鷓鴣飛處處湘雲合郎従何處歸揚州懐古故國歌鐘地長橋車馬塵彭城郭邉柳偏似不勝春揚州早鴈江上三千鴈年年過故宮可憐江上月偏照斷根蓬金吾子繡帳博山爐銀鞍馮子都黄昏莫攀折驚起欲棲烏洛橋金谷園中柳春來似舞腰那堪好風景獨上洛陽橋李端聽箏鳴箏金粟柱素手玉房前欲得周郎顧時時誤拂絃溪行遇雨寄柳中庸日落衆山昬瀟瀟暮雨繁那堪兩處宿共聽一聲猿盧綸塞下曲四首鷲翎金僕姑燕尾繡蝥弧獨立揚新令千營共一呼林暗草驚風將軍夜引弓平明尋白羽沒在石稜中月黑鴈飛高單于逺遁逃欲將輕騎逐大雪滿弓刀野幕敞瓊筵羌戎賀勞旋醉和金甲舞雷鼓動山川皇甫冉送王司直西塞雲山逺東風道路長人心勝潮水相送過潯陽婕妤怨二首花枝出建章鳯輦發昭陽借問承恩者雙蛾幾許長長信多秋氣昭陽借月華那堪閒永巷聞道選良家淮口寄趙員外欲逐淮潮上暫停魚子溝相望知不見終是屢回頭司空曙金陵懷古輦路江楓暗宮朝野草春傷心庾開府老作北朝臣送盧秦卿知有前期在難分此夜中無將故人酒不及石尤風韓翃漢宮曲繡幙珊瑚鉤香閨翡翠樓深情不肯道嬌倚鈿箜篌柳中庸江行繁隂乍隠洲落葉初飛浦蕭蕭楚客帆暮入寒江雨戴叔倫題三閭大夫廟沅湘流不盡屈子怨何深日暮秋風起蕭蕭楓樹林闗山月一鴈過連營繁霜覆古城胡笳在何處半夜起邉聲嚴維送人往金華明月雙谿水清風八詠樓少年為客處今日送君遊朱放題竹林寺嵗月人間促煙霞此地多殷勤竹林寺更得幾回過武元衡春日作縱横桃李枝澹蕩春風吹美人歌白苧萬恨在蛾眉權徳輿敷水驛空見水名敷秦樓往事無臨風駐征騎聊復捋髭鬚玉臺體昨夜裠帶解今朝蟢子飛鉛華不可棄莫是藁砧歸柳宗元長沙驛海鶴一為别存亡三十秋今來數行淚獨上驛南樓江雪千山鳥飛絶萬徑人蹤滅孤舟蓑笠翁獨釣寒江雪劉禹錫罷和州遊建康秋水清無力寒山暮多思官閒不計程徧上南朝寺經檀道濟故壘萬里長城壞荒營野草秋秣陵多士女猶唱白符鳩視刀環常恨言語淺不如人意深今朝兩相視脈脈萬重心三閣詞珠薄曲瓊鉤子細見揚州北兵那得渡浪語判悠悠淮隂行二首今日轉船頭金烏指西北煙波與春草千里同一色隔浦望行船頭昻尾幰幰無奈挑菜時清淮春浪軟挑菜本作脫萊周益公詩話云山谷謂淮隂行情調殊麗惟脫萊時不可解予見古本作挑菜時東坡惠州詩水生挑菜渚恐用此語今従之詩話首句作隔浦望郎船與此小異秋風引何處秋風至蕭蕭送鴈羣朝來入庭樹孤客最先聞紇那曲楊柳鬱青青竹枝無限情周郎一回顧聽唱紇那聲别蘇州流水閶門外秋風吹柳條従來送客處今日自魂銷孟郊古别離欲别牽郎衣郎今向何處不恨歸來遲莫向臨卭去張籍寄僧松暗水涓涓夜涼人未眠西峰月猶在遥憶草堂前涇州行到涇州塞惟聞羌戍鼙道旁雙古堠猶記向安西令狐楚逺别離玳織黄金履金裝翡翠簪畏人相借問不擬到城南思君恩小苑鶯歌歇長門蜨舞多眼看春又去翠輦不曽過従軍行二首暮雪連青海隂雲覆白山可憐班定逺生入玉門闗却望氷河闊前登雪嶺高征人幾多在又擬戰臨洮王涯閨人贈逺二首花明綺陌春柳拂御溝新為報遼陽客流光不待人形影一朝别煙波千里分君看望君處祇是起行雲張仲素春閨思裊裊城邉柳青青陌上桑提籠忘采葉昨夜夢漁陽春遊曲行樂三春節林花百和香當年重意氣先占鬭雞塲白居易庾樓新嵗嵗時銷旅貌風景觸鄉愁牢落江湖意新年上庾樓南浦别南浦淒淒别西風嫋嫋秋一看腸一斷好去莫回頭勤政樓西柳半朽臨風樹多情立馬人開元一株柳長慶二年春問劉十九緑螘新醅酒紅泥小火爐晚來天欲雪能飲一杯無元稹行宮寥洛古行宮宮花寂寞紅白頭宮女在閒坐說𤣥宗西還悠悠洛陽夢鬱鬱灞陵樹落日正西歸逢君又東去李賀馬詩二首赤無人用當須呂布騎吾聞果下馬羈策任蠻兒飂叔去匆匆如今不豢龍夜來霜壓棧駿骨折西風張祜河滿子故國三千里深宮二十年一聲河滿子雙淚落君前玉樹後庭花輕車何草草猶唱後庭花玉座誰為主徒悲張麗華江南逢故人河洛多塵事江山半舊遊春風故人夜又醉白蘋洲徐凝楊叛兒哀怨楊叛兒駘蕩君知否香死博山爐烟生白門柳張起春情畫閣餘寒在新年舊燕飛梅花猶帶雪未得試春衣楊凌賈客怨山水路悠悠逢灘即滯留西江風未便何日到荆州楊凝柳絮河畔多楊柳追遊盡狹斜春風一回送亂入莫愁家唐彦謙齊文惠宮人認得前家令宮人淚滿裾不知梁佐命全是沈尚書小院小院無人夜烟斜月轉明清宵易怊悵不必有離情賈島劒客十年磨一劒霜刃未曽試今日把似君誰有不平事陸暢雪怪得朔風急前庭如月輝天人寧許巧剪水作花飛沈如筠閨怨鴈盡書難寄愁多夢不成願隨孤月影流照伏波營潘佐送人之宣城江畔送行人千山生暮氛謝安團扇上為畫敬亭雲杜牧題水西寺三日去還住一生焉再遊含情碧溪水重上粲公樓寄逺隻影隨驚鴈單棲鎖畫籠向春羅袖薄誰念舞臺風江樓獨酌芳春酒登樓已半醺誰驚一行鴈衝斷過江雲李商隠漫成霧夕詠芙蕖何郎得意初此時誰最賞沈范兩尚書張惡子廟下馬奠椒漿迎神白玉堂如何鐵如意獨自與姚萇追代盧家人嘲堂内道却横波字人前莫漫羞秖應同楚水長短入淮流李夫人一帶不結心兩股方安髻慚愧白茅人月沒教星替滯雨滯雨長安夜殘燈獨客愁故鄉雲水地歸夢不宜秋餞席送人之梓州莫歎萬重山君還我未還武闗猶悵望何況百牢闗柳枝集作無題本是律詩上二句亦不同本是丁香樹春條結始生王作彈棊局中心最不平散闗遇雪劒外従軍逺無人與寄衣散闗三尺雪回夢舊鴛機温庭筠三月雪三月雪連夜未應傷物華只縁春欲盡留著伴梨花碧澗驛曉思孤燈伴殘夢楚國在天涯月落子規歇滿庭山杏花許渾早春憶江南雲月有歸處故山清洛南如何一花發春夢徧江潭塞下曲夜戰桑乾北秦兵半不歸朝來有鄉信猶自寄寒衣趙嘏寒塘曉髮梳臨水寒塘坐見秋鄉心正無限一鴈過南樓施肩吾湘竹詞萬古湘江竹無窮奈怨何年年長春筍只是淚痕多李頻渡漢江嶺外音書絶經冬復歴春近鄉情更怯不敢問來人孟遲懷鄭洎風蘭舞幽香雨葉墮殘滴美人來不來前山看向夕陸龜蒙江行酒旗菰葉外樓影浪花中布帆張數幅唯待鯉魚風夕陽渡口和帆落城邊帶角收如何茂陵客江上倚危樓皮日休和陸魯望刻石書離恨因成别後悲莫嫌春繭薄猶有萬重絲司空圖樂府寳馬跋塵光雙馳照路旁喧傳報戚里明日幸長楊韓偓效崔國輔體雨過碧苔院霜來紅葉樓閒堦上斜日鸚鵡伴人愁従獵蹀躞巴賨馬陪鰓碧野雞忽聞仙樂動賜酒玉偏提儲嗣宗早春野樹花初發空山獨見時踟蹰歴陽道鄉思滿南枝鄭谷望湖亭湘水似伊水湘人非故人登臨獨無語風柳自揺春李收或作牧幽情幽人惜春暮潭上折芳草佳期何時還欲寄千里道蔣吉石城繫纜石城下孤吟懷暫開江人橈艇子將謂莫愁來西鄙人哥舒歌北斗七星高哥舒夜帶刀至今窺牧馬不敢過臨洮荆叔題慈恩寺塔漢國山河在秦陵草木深暮雲千里色無處不傷心釋靈澈題天姥天台衆峰外嵗晚當寒空有時半不見崔嵬在雲中逺公墓古墓石稜稜寒雲晚照凝空悲虎溪月不見鴈門僧釋貫休聞笛霜月夜徘徊樓中羌笛催曉風吹不盡江上落殘梅洞庭龍女與許漢陽海門連洞庭每去三千里十載一歸來辛苦瀟湘水湘驛女子題玉溪紅樹醉秋色碧溪彈夜絃佳期不可再風雨杳如年安邑坊女子幽恨詩卜得上峽日秋江風浪多江陵一夜雨腸斷木蘭歌唐人萬首絶句選巻二
