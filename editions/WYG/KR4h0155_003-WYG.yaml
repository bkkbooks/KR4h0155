body:
  text: 唐人萬首絶句選巻三宋洪邁元本刑部尚書王士禎選七言一杜審言贈蘇書記知君書記本翩翩為許従戎赴朔邊紅粉樓中應計日燕支山下莫經年張說送梁六巴陵一望洞庭秋日見孤峰水上浮聞道神仙不可接心隨湖水共悠悠張敬忠邊詞五原春色舊來遲二月垂楊未挂絲即今河畔氷開日正是長安花落時王翰春日思歸楊柳青青杏發花年光誤客轉思家不知湖上菱歌女幾箇春舟在若耶涼州詞蒲桃美酒夜光杯欲飲琵琶馬上催醉卧沙塲君莫笑古來征戰幾人回李白結襪子燕南壯士吳門豪筑中置鉛魚隠刀感君恩重許君命太山一擲輕鴻毛長門怨桂殿長愁不記春黄金四壁起秋塵夜懸明鏡秋天上獨照長門宮裏人越中懷古越王勾踐破吳歸戰士還家盡錦衣宮女如花滿春殿秖今惟有鷓鴣飛送孟浩然之廣陵故人西辭黄鶴樓煙花三月下揚州孤帆逺影碧空盡惟見長江天際流春夜雒陽聞笛誰家玉笛暗飛聲散入東風滿洛城此夜曲中聞折柳何人不起故園情峨眉山月歌峨眉山月半輪秋影入平羌江水流夜發青溪向三峽思君不見下渝州横江詞二首海潮南去過潯陽牛渚由來險馬當横江欲渡風波惡一水牽愁萬里長横江館前津吏迎向余東指海雲生郎今欲渡縁何事如此風波不可行上皇西巡南京歌莫道君王行路難六龍西幸萬人歡地轉錦江成渭水天迴玉壘作長安黄鶴樓聞笛一為遷客去長沙西望長安不見家黄鶴樓中吹玉笛江城五月落梅花下江陵朝辭白帝彩雲間千里江陵一日還兩㟁猿聲啼不住輕舟巳過萬重山望五老峰廬山東南五老峰青天削出金芙蓉九江秀色可攬結吾將此地巢雲松宣城見杜鵑花蜀國曾聞子規鳥宣城還見杜鵑花一呌一回腸一斷三春三月憶三巴舟下荆門霜落荆門煙樹空布颿無恙挂秋風此行不為鱸魚膾自愛名山入剡中與賈舍人至汎洞庭二首洞庭西望楚江分水盡南天不見雲日落長沙秋色逺不知何處弔湘君洞庭湖西秋月輝瀟湘江北早鴻飛醉客滿船歌白紵不知霜露入秋衣巴陵贈賈舍人賈生西望憶京華湘浦南遷莫怨嗟聖主恩深漢文帝憐君不遣到長沙望天門山天門中斷楚江開碧水東流向北迴兩岸青山相對出孤帆一片日邊來長門怨天迴北斗挂西樓金屋無人螢火流月光欲到長門殿别作深宮一段愁陌上贈美人白馬驕行踏落花垂鞭直拂五雲車美人一笑搴珠箔遥指紅樓是妾家王昌齡閨怨閨中少婦不知愁春日凝妝上翠樓忽見陌頭楊柳色悔教夫壻覓封侯聽流人水調子孤舟微月對楓林分付鳴箏與客心嶺色千重萬重雨斷腸收與淚痕深梁苑梁園秋竹古時煙城外風悲欲暮天萬乗旌旗何處在平臺賔客有誰憐别李浦之京故園今在灞陵西江畔逢君醉不迷小弟鄰莊尚漁獵一封書寄數行啼甘泉歌乗輿執玉已登壇細草霑衣春殿寒昨夜雲生拜初月萬年甘露水晶盤芙蓉樓送辛漸二首寒雨連江夜入吳平明送客楚山孤洛陽親友如相問一片氷心在玉壺丹陽城南秋海隂丹陽城北楚雲深高樓送客不能醉寂寂寒江明月心重别李評事莫道秋江離别難舟船明日是長安吳姬緩舞留君醉隨意青楓白露寒送狄宗亨秋在水清山暮蟬洛陽樹色鳴臯煙送君歸去愁不盡又惜空度涼風天送别魏二醉别江樓橘柚香江風引雨入船涼憶君遥在湘山月愁聽清猿夢裏長盧溪别人武陵溪口駐扁舟溪水隨君向北流行到荆門上三峽莫將孤月對猿愁長信秋詞三首金井梧桐秋葉黄珠簾不巻夜來霜熏籠玉枕無顔色卧聴南宮清漏長奉帚平明金殿開且將團扇共徘徊玉顔不及寒鴉色猶帶昭陽日影來真成薄命久尋思夢見君王覺後疑火照西宮知夜飲分明複道奉恩時西宮春怨西宮夜靜百花香欲巻珠簾春恨長斜抱雲和深見月朦朧樹色隐昭陽西宮秋怨芙蓉不及美人妝水殿風來珠翠香却恨含情掩秋扇空懸明月待君王從軍行五首烽火城西百尺樓黄昬獨坐海風秋更吹羌笛闗山月無那金閨萬里愁琵琶起舞換新聲總是闗山離别情撩亂邊愁聴不盡高高秋月照長城青海長雲暗雪山孤城遥望玉門闗黄沙百戰穿金甲不破樓蘭終不還秦時明月漢時闗萬里長征人未還但使龍城飛將在不教朔馬度隂山大漠風塵日色昬紅旗半巻出轅門前軍夜戰洮河北巳報生禽吐谷渾殿前曲昨夜風開露井桃未英前殿月輪高平陽歌舞新承寵簾外春寒賜錦袍青樓怨香幃風動花入樓高調鳴箏緩夜愁腸斷闗山不解說依依殘月下簾鈎青樓曲二首白馬金鞍從武皇旌旗十萬宿長楊樓頭小婦鳴箏坐遥見飛塵入建章馳道楊花滿御溝紅妝漫綰上青樓金章紫綬千餘騎夫壻朝回初拜侯河上歌河上老人坐古槎和丹只用青蓮花至今八十如四十口道滄溟是我家王維送元二使安西渭城朝雨裛輕塵客舍青青柳色新勸君更盡一杯酒西出陽闗無故人少年行三首新豐美酒斗十千咸陽遊俠多少年相逢意氣為君飲繫馬高樓垂柳邊一身能擘兩雕弧邊騎千重只似無側坐金鞍調白羽紛紛射殺五單于漢家君臣歡宴終高議雲臺論戰功天子臨軒賜侯印將軍佩出明光宮寄段十六與君相見即相親聞道君家住孟津為見行舟試借問客中時有洛陽人九月九日憶山東兄弟獨在異鄉為異客毎逢佳節倍思親遥知兄弟登高處徧插茱萸少一人送韋評事欲逐將軍取右賢沙塲走馬向居延遥知漢使蕭闗外愁見孤城落日邊送沈子楊柳渡頭行客稀罟師蕩槳向臨沂唯有相思似春色江南江北送君歸寒食汜上作廣武城邊逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊柳青青渡水人涼州詞涼州城外少行人百尺峰頭望塞塵健兒擊鼓吹羌笛共賽城東越騎神王之渙涼州詞黄河逺上白雲間一片孤城萬仞山羌笛何須怨楊柳春光不度玉門闗杜甫江畔獨步尋花三首稠花亂蘂裹江濵行步欹危實怕春詩酒尚堪驅使在未須料理白頭人黄師塔前江水東春光懶困倚微風桃花一簇開無主可愛深紅間淺紅黄四孃家花滿溪千朶萬朶壓枝低流連戲蜨時時舞自在嬌鶯恰恰啼戲作寄上漢中王謝安舟檝風還起梁苑池臺雪欲飛杳杳東山攜漢妓泠泠修竹待王歸和嚴鄭公軍城早秋秋風嫋嫋動高旌玉帳分弓射敵營巳收滴博雲間戍更奪蓬婆雪外城解悶四首商胡離别下揚州憶上西陵故驛樓為問淮南米貴賤老夫乘興欲東遊一辭故國十經秋每見秋瓜憶故丘今日南湖采薇蕨何人為覔鄭瓜州不見高人王右丞輞川丘壑蔓寒藤最傳秀句寰區滿未絶風流相國能復憶襄陽孟浩然清詩句句盡堪傳即今耆舊無新語漫釣槎頭縮項鯿戲為絶句才力應難跨數公秖今誰是出羣雄或看翡翠蘭苕上未掣鯨魚碧海中承聞河北諸將入朝口號十二年來多戰塲天威已息陣堂堂神靈漢代中興主功業汾陽異姓王江南逢李龜年岐王宅裏尋常見崔九堂前幾度聞正是江南好風景落花時節又逢君孟浩然送杜十四之江南荆吳相接水為鄉君去春江正淼茫日暮孤帆泊何處天涯一望斷人腸常建送宇文六花暎垂楊漢水清微風林裏一枝輕秖今江北還如此愁殺江南離别情三日尋李九莊雨歇楊林東渡頭永和三日蕩輕舟故人家在桃花岸直到門前溪水流高適除夜旅館寒燈獨不眠客心何事轉悽然故鄉今夜思千里霜鬢明朝又一年營州歌營州少年厭原野狐裘蒙茸獵城下一飲千鍾不醉人自來十嵗能騎馬塞上聞笛雪淨遥天牧馬還月明羌笛戍樓閑借問梅花何處落風吹一夜滿闗山九曲詞鐵騎横行鐵嶺頭西看邏逤取封侯青海秖今將飲馬黄河不用更防秋岑參玉闗寄長安主簿東去長安萬里餘故人何惜一行書玉闗西望腸堪斷況復明朝是嵗除送人西原驛路挂城頭客散江亭雨未休君去試看汾水上白雲猶似漢時秋赴北庭度隴思家西向輪臺萬里餘也知鄉信日應疎隴山鸚鵡能言語為報家人數寄書封大夫破播仙凱歌二首漢將承恩西破戎捷書先奏未央宮天子預開麟閣待秖今誰數貳師功日落轅門鼓角鳴千羣面縛出蕃城洗兵魚海雲迎陣秣馬龍堆月照營儲光羲寄孫山人新林二月孤舟還水滿清江花滿山借問故園隠君子時時來往在人間明妃曲日暮驚沙亂雪飛傍人相勸易羅衣强來前帳看歌舞共待單于夜獵歸賈至巴陵夜别王八員外柳絮飛時别洛陽梅花發後在三湘世情巳逐浮雲散離恨空隨江水長送李侍郎赴常州雪晴雲散北風寒楚水吳山道路難今日送君須盡醉明朝相憶路漫漫春思紅粉當墟弱柳垂金花臘酒解酴醿笙歌日暮能留客醉殺長安輕薄兒巴陵與李十二裴九汎洞庭二首江上相逢皆舊遊湘山永望不堪愁明月秋風洞庭水孤鴻落葉一扁舟楓岸紛紛落葉多洞庭秋水晚來波乘興輕舟無近逺白雲明月弔湘娥李頎遇劉五洛陽一别梨花新黄鳥飛飛逢故人攜手當年共為樂無驚蕙草惜殘春寄韓朋為政心閒物自閒朝看飛鳥暮飛還寄書河上神明宰羨爾城頭姑射山綦母潛過上人蘭若山頭禪室挂僧衣牕外無人溪鳥飛黄昬半在下山路却聴鐘聲連翠微崔國輔白紵詞洛陽梨花落如霰河陽桃葉生復齊坐恐玉樓春欲盡紅綿粉絮裛妝啼張旭古本作張顛桃花磯隠隱飛橋隔野煙石磯西畔問漁船桃花盡日隨流水洞在青溪何處邊山中留客山光物態弄春暉莫為輕隂便擬歸縱使晴明無雨色入雲深處亦沾衣嚴武軍城早秋昨夜秋風入漢闗朔雲邊月滿西山更催飛將追驕敵莫遣沙塲匹馬還薛維翰怨歌百尺朱樓臨狹斜新妝能唱美人車皆言賤妾紅顔好要自狂夫不憶家李華春行寄興宜陽城下草萋萋澗水東流復向西芳樹無人花自落春山一路鳥空啼獨孤及海上懷華中舊遊涼風臺上三峰月不夜城邊萬里沙離别莫言闗塞逺夢魂長在子真家元結款乃曲二首湘江二月春水平滿月和風宜夜行唱橈欲過平陽戍津吏相呼問姓名千里楓林煙雨深無朝無暮有猿吟停橈靜聴曲中意好是雲山韶濩音韋應物登樓寄王卿踏閣攀林恨不同楚雲滄海思無窮數家砧杵秋山下一郡荆榛寒雨中寄諸弟雨中禁火空齋冷江上流鶯獨坐聴把酒看花想諸弟杜陵寒食草青青故人重九日求橘憐君卧病思新橘試摘猶酸亦未黄書後欲題三百顆洞庭須待滿林霜休日訪人不遇九日驅馳一日閒尋君不遇又空還怪來詩思清人骨門對寒流雪滿山登寳意上方翠嶺香臺出半天萬家煙樹滿晴川諸僧近住不相識坐聽微鐘憶往年滁州西澗獨憐幽草澗邊生上有黄鸝深樹鳴春潮帶雨晚來急野渡無人舟自横荅東林道士紫閣西邊第幾峰茅齋夜雪虎行蹤遥看黛色知何處欲出山門尋暮鐘劉長卿送劉萱之道州謁崔大夫沅水悠悠湘水春臨岐一望一沾巾信陵門下三千客君到長沙見幾人送李判官之潤州行營萬里辭家事鼓鼙金陵驛路楚雲西江春不肯留行客草色青青送馬蹄寄别朱拾遺天書逺召滄浪客幾度臨岐病未能江海茫茫春欲徧行人一騎發金陵錢起歸鴈瀟湘何事等閒回水碧沙明兩岸苔二十五弦彈夜月不勝清怨却飛來李嘉祐王舍人竹樓傲吏身閒笑五侯西江取竹起高樓南風不用蒲葵扇紗帽閒眼對水鷗題䖍上人壁詩思禪心共竹閒任池流水向人間手持如意高牕裏斜日沿江千萬山韓翃送客之鄂州江口千家帶楚雲江花亂㸃雪紛紛春風落日誰相見青翰舟中有鄂君送齊山人舊事仙人白公掉頭歸去乂乘風柴門流水依然在一路寒山萬木中寒食春城無處不飛花寒食東風御柳斜日暮漢宮傳蠟燭輕煙散入五侯家宿石邑山中浮雲不共此山齊山靄蒼蒼望轉迷曉月暫飛千樹裏秋河隔在數峰西江南曲長樂花枝雨㸃消江城日暮好相邀朱樓不閉嵗蕤鎖渌水迴通宛轉橋酬張千牛蓬萊闕下事天家上路初回白鼻騧細管晝催平樂酒春衣夜宿杜陵花贈李冀王孫别舍擁朱輪不羨空名樂此身門外碧潭春洗馬樓前紅燭夜迎人送人之潞州官柳青青匹馬嘶回風暮雨入銅鞮佳期别在春山裏應是人參五葉齊少年行千㸃斑斕噴玉驄青絲結尾繡纏鬃鳴鞭曉出章臺路葉葉春衣楊柳風皇甫冉荅張繼悵望南徐登北固迢遥西塞阻東闗落日臨川問音信寒潮惟帶夕陽還送魏十六秋夜沈沈此送君隂蟲切切不堪聞歸舟明日毘陵道回首姑蘇是白雲皇甫曾巖嶺西望漢家仙仗在咸陽洛水東流出建章野老至今猶望幸離宮秋樹獨蒼蒼唐人萬首絶句選巻三
