  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0155_WYG_001-1a, image: WYG1459/WYG1459-0087c.png}
body:
  text: 唐人萬首絶句選卷一宋洪邁元本刑部尚書王士禎選五言一王勃寒夜思三首久别侵懷抱他鄉變容色月夜調鳴琴相思此何極雲間征思斷月下歸愁切鴻鴈西南飛如何故人别朝朝碧山下夜夜滄江曲復此遙相思清尊湛芳淥别人霜華淨天末霧色籠江際客子常畏人胡為久留滯思歸長江悲已滯萬里念將歸況復高風晚山山黃葉飛盧照鄰曲江花浮香繞曲岸圓影覆華池常恐秋風早飄零君不知駱賔王易水此地别燕丹壯士髮衝冠昔時人已沒今日水猶寒上官儀洛堤曉行脈脈廣川流驅馬歷長洲鵲飛山月曙蟬噪野風秋韋承慶南行别弟萬里人南去三春鴈北飛未知何嵗月得與爾同歸宋之問塗中寒食馬上逢寒食塗中屬暮春可憐江浦望不見洛橋人送杜審言卧病人事絶嗟君萬里行河橋不相送江樹逺含情張説蜀道後期客心爭日月來往預期程秋風不相待先到洛陽城廣州作去國嵗方晏愁心轉不堪離人與江水終日向西南郭元振子夜春歌二首青樓含日光緑池起風色贈子同心花殷勤此何極陌頭楊柳枝已被春風吹妾心正斷絶君懷那得知蘇頲汾上驚秋北風吹白雲萬里渡河汾心緒逢搖落秋聲不可聞張九齡自君之出矣自君之出矣不復理殘機思君如滿月夜夜減清輝王適江上梅忽見寒梅樹花開漢水濵不知春色早疑是弄珠人東方虬王昭君二首掩涕辭丹鳯銜悲向白龍單于浪驚喜無復舊時容北地無花草春來不似春自然衣帶緩非是為腰身盧僎南樓望去國三巴逺登樓萬里春傷心江上客不是故鄉人途中抱玉三朝楚懷書十上秦年年洛陽陌花鳥弄歸人王維答裴迪渺渺寒流廣蒼蒼秋雨晦君問終南山心知白雲外鳥鳴澗雲溪雜題人間桂花落夜靜春山空月出驚山鳥時鳴春澗中萍池春池深且廣會待輕舟回靡靡緑萍合垂楊掃復開鸕鷀堰乍向紅蓮沒復出青蒲揚獨立何褵褷銜魚古查上孟城坳輞川集新家孟城口古木餘衰柳來者復為誰空悲昔人有華子岡飛鳥去不窮連山復秋色上下華子岡惆悵情何極斤竹嶺檀欒映空曲青翠漾漣漪暗入商山路樵人不可知鹿柴空山不見人但聞人語響返景入深林復照青苔上木蘭柴秋山斂餘照飛鳥逐前侶彩翠時分明夕嵐無處所南垞輕舟南垞去北垞渺難即隔浦望人家遙遙不相識欒家瀨颯颯秋雨中淺淺石溜瀉跳波自相濺白鷺驚復下白石灘清淺白石灘緑蒲向堪把家住水東西浣紗明月下竹里館獨坐幽篁裏彈琴復長嘯深林人不知明月來相照辛夷塢木末芙蓉花山中發紅萼澗戶寂無人紛紛開且落漆園古人非傲吏自闕經世務偶寄一微官婆娑數株樹山中送别山中相送罷日暮掩柴扉春草明年緑王孫歸不歸左掖梨花間灑階前草輕隨箔外風黃鶯弄不足銜入未央宮息夫人莫以今時寵難忘舊日恩看花滿眼淚不共楚王言相思子紅豆生南國春來發幾枝勸君休采擷此物最相思班婕妤宮殿生秋草君王恩幸疏那堪聞鳯吹門外度金輿雜詠二首客自故鄉來應知故鄉事來日綺窗前寒梅著花未已見寒梅發復聞啼鳥聲心心視春草畏向玉階生裴迪鹿柴日夕見寒山便為獨往客不知深林事但有麏麚迹木蘭柴蒼蒼落日時鳥聲亂溪水緑溪路轉深幽興何時已茱萸沜飄香亂椒桂布葉間檀欒雲日雖回照森沈猶自寒宮槐陌門前宮槐陌是向欹湖道秋來山雨多落葉無人掃南垞孤舟信風泊南垞湖水岸落日下崦嵫清波殊渺漫金屑泉瀠渟憺不流金碧如可拾凌晨含素華獨往事朝汲白石灘跂石復臨水弄波情未極日下川上寒浮雲淡無色送崔九歸山深淺去須盡丘壑美莫學武陵人暫遊桃源裏李白玉階怨玉階生白露夜久侵羅襪却下水精簾玲瓏望秋月夜思牀前明月光疑是地上霜舉頭望山月低頭思故鄉銅官山我愛銅官樂千年未擬還要須回舞袖拂盡五松山敬亭獨坐衆鳥高飛盡孤雲去獨間相看兩不厭只有敬亭山青溪半夜聞笛羌笛梅花引吳溪隴水清寒山秋浦月腸斷玉關情秋浦歌愁作秋浦客強看秋浦花山川如剡縣風日似長沙送陸判官往琵琶峽水國秋風夜殊非逺别時長安如夢裏何日是歸期重憶賀監欲向江東去將誰共舉杯稽山無賀老却棹酒船回杜甫八陳圖功蓋三分國名高八陳圖江流石不轉遺恨失吞吳孟浩然送朱大入秦遊人五陵去寶劒直千金分手脫相贈平生一片心祖詠望終南殘雪終南隂嶺秀積雪浮雲端林表明霽色城中增暮寒崔國輔銅雀臺朝日照紅妝擬上銅雀臺畫眉猶未了魏帝使人催采蓮曲玉漵花紅發金塘水碧流相逢畏相失並著采蓮舟王孫遊自與王孫别頻看黃鳥飛應緣春草誤著處不成歸怨詞妾有羅衣裳秦王在時作為舞春風多秋來不堪著少年行遺却珊瑚鞭白馬驕不行章臺折楊柳春日路旁情渭西别李崙隴外長亭堠山深古塞秋不知嗚咽水何事向西流崔皓長干曲三首君家住何處妾住在橫塘停舟暫借問或恐是同鄉家臨九江水來去九江側同是長干人生小不相識下渚多風浪蓮舟漸覺稀那能不相待獨自逆潮歸王昌齡送張四楓林已愁暮楚水復堪悲别後冷山月清猿無斷時留别武陵田太守按劒行千里微軀感一言曽為大梁客不負信陵恩題僧房棕櫚花滿院苔蘚入間房彼此名言絶空中聞異香朝來曲日昃鳴珂動花連繡戶春盤龍玉臺鏡唯待畫眉人高適詠史尚有綈袍贈應憐范叔寒不知天下士猶作布衣看岑參見渭水思秦川渭水東流去何時到雍州憑添兩行淚寄向故園流九日思長安故園強欲登高去無人送酒來遙憐故園菊應傍戰場開王之渙送别楊栁東門樹青青夾御河近來攀折苦應為别離多登鸛雀樓白日依山盡黃河入海流欲窮千里目更上一層樓儲光羲江南曲日暮長江裏相邀歸渡頭落花如有意來去逐船流洛陽道大道直如髮春日佳氣多五陵貴公子雙雙鳴玉珂賈至有贈舞怯銖衣重笑疑桃臉開方知漢成帝虛築避風臺王縉别輞川山月曉仍在林風涼不絶殷勤如有情惆悵令人别崔興宗留别王維駐馬欲分襟清寒御溝上前山景氣佳獨往還惆悵丘為左掖梨花冷豔全欺雪餘香乍入衣春風且莫定吹向玉階飛張旭清溪汛舟旅人倚征棹薄暮起勞歌笑攬清溪月清輝不厭多李華奉寄彭城公公子三千客人人願報恩應憐抱關者貧病老夷門蕭穎士九日别元魯山綿連滍川迥杳眇鴉路深彭澤興不淺臨風動歸心崔曙雨中送客别愁復兼雨别淚還如霰寄言海上雲千里長相見于季子項羽北伐雖全趙東歸不王秦空歌拔山力羞作渡江人薛奇童吳聲子夜歌淨掃黃金階飛霜皎如雪下簾彈箜篌不忍見秋月韋應物寄盧陟栁葉遍寒塘曉霜凝高閣纍日此留連别來成寂寞宿永陽寄璨師遙知郡齋夜凍雪封松竹時有山僧來懸燈獨自宿秋夜寄丘員外懷君屬秋夜散步詠涼天山空松子落幽人應未眠答王卿送别去馬嘶春草歸人立夕陽元知數日别要使兩情傷懷琅琊二釋子白雲埋大壑隂崖滴夜泉應居西石室月照山蒼然登樓兹樓日登眺流歲暗蹉跎坐厭淮南守秋山紅樹多聞鴈故園渺何處歸思方悠哉淮南秋雨夜高齋聞鴈來劉長卿春草宮懷古君王不可見芳草舊宮春猶帶羅裙色青青向楚人彈琴泠泠七絃上靜聽松風寒古調雖自愛今人多不彈送人往揚州京口發梅花山中動泉脈蕪城春草生君作揚州客送上人孤雲將野鶴豈向人間住莫買沃洲山時人巳知處送靈徹蒼蒼竹林寺杳杳鐘聲晚荷笠帶斜陽青山獨歸逺平蕃曲絶漠大軍還平沙獨戍間空留一片石萬古在燕山錢起江行無題五首行背青山郭吟當白露秋風流無屈宋空詠古荆州蛩響依莎草螢飛透水煙夜涼誰詠史空泊運租船櫓慢開輕浪帆虛入暮雲客船雖自小容得庾將軍只尺愁風雨匡廬不可登秪疑雲霧裏猶有六朝僧湖口分江水東流獨有情當時好風物誰伴謝宣城劉方平采蓮曲落日清江裏荆歌豔楚腰采蓮從小慣十五即乘潮京兆眉新作蛾眉樣惟將月裏同有來凡幾日相效滿城中春雪飛雪帶春風徘徊亂繞空君看似花處偏在洛城東張繼感懷調與時人背心將靜者論終年帝城裏不識五侯門暢當登鸛雀樓迥臨飛鳥上高出世塵間天勢圍平野河流入斷山顧況憶舊遊悠悠南國思夜向江南泊楚客斷腸時月明楓子落丘丹酬韋蘇州久作煙霞侶暫將簪組親還同禇伯玉入館忝州人蓋嘉運伊州歌聞道黃花戍頻年未解兵可憐閨裏月偏照漢家營唐人萬首絶句選卷一
